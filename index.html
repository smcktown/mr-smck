/* ---------------- PRACTICE (tick off studied words) ---------------- */
function tickCount(c){ return (c.words||[]).filter(w=>c.ticks && c.ticks[w]).length; }
function sayZh(txt){
  // 听写 is a LISTENING test — let the app read the word out instead of a parent having to
  try{
    if(!window.speechSynthesis) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(txt);
    u.lang = 'zh-CN'; u.rate = 0.75;
    const v = speechSynthesis.getVoices().find(v=>/^zh/i.test(v.lang));
    if(v) u.voice = v;
    speechSynthesis.speak(u);
  }catch(e){}
}
function sayCard(ev, capId, i){
  ev.stopPropagation();                     // tapping 🔊 reads it out; it must NOT flip the card
  const c = CAPS.find(x=>x.id===capId);
  if(c && c.words && c.words[i]) sayZh(c.words[i]);
}
function hasPinyin(c){ return !!(c.py && Object.keys(c.py).length); }
function tickableWords(c, big){
  // A 听写 sheet with pinyin gets FLIP-CARDS, each section tested the way school tests it:
  //   我会写 → prompt is the pinyin (or 🔊), she writes the 汉字, taps to check
  //   我会认 → prompt is the 汉字,        she writes the pinyin, taps to check
  // Anything else (English spelling, a hand-typed list) keeps the plain tick-off chips.
  if(!hasPinyin(c)) {
    return `<div class="wordlist">${c.words.map((w,i)=>
      `<button class="word ${big?'big':''} ${c.ticks&&c.ticks[w]?'done':''}" onclick="toggleTick('${c.id}',${i},this)">${esc(w)}</button>`
    ).join('')}</div>`;
  }
  const py = c.py||{}, md = c.mode||{};
  const sections = [
    {k:'write', title:'✍️ 我会写', hint:'Listen / read the pinyin → write the 汉字. Tap to check.'},
    {k:'recog', title:'🔤 我会认', hint:'See the 字 → write the pinyin. Tap to check.'}
  ];
  return sections.map(sec=>{
    const items = c.words.map((w,i)=>({w,i})).filter(x=> (md[x.w]==='recog' ? 'recog' : 'write') === sec.k);
    if(!items.length) return '';
    return `<div class="pgroup"><h4>${sec.title}</h4><div class="ph">${sec.hint}</div>
      <div class="pcards">${items.map(({w,i})=>{
        const done = c.ticks && c.ticks[w] ? 'done' : '';
        const p = py[w] || '';
        return sec.k==='recog'
          ? `<button class="pcard recog ${done}" onclick="cardTap('${c.id}',${i},this)">
               <span class="say" onclick="sayCard(event,'${c.id}',${i})">🔊</span>
               <span class="q">${esc(w)}</span>
               <span class="hint">pinyin?</span><span class="a">${esc(p||'—')}</span></button>`
          // NEVER show the 汉字 on the front of a 我会写 card — that's the answer. If the pinyin
          // didn't survive the scan, the prompt is purely the read-aloud, which is what 听写 is anyway.
          : `<button class="pcard ${done}" onclick="cardTap('${c.id}',${i},this)">
               <span class="say" onclick="sayCard(event,'${c.id}',${i})">🔊</span>
               <span class="q" style="font-size:${p ? (p.length>14?'14px':'18px') : '20px'}">${p?esc(p):'🔊 listen'}</span>
               <span class="hint">${p?'写?':'tap 🔊 → write it'}</span>
               <span class="a" style="font-size:${w.length>6?'15px':'20px'}">${esc(w)}</span></button>`;
      }).join('')}</div></div>`;
  }).join('');
}
function cardTap(capId, i, el){
  // first tap reveals the answer, second tap ticks it off
  if(!el.classList.contains('shown')){
    el.classList.add('shown');
    const c = CAPS.find(x=>x.id===capId);
    if(c && (c.mode||{})[c.words[i]] !== 'recog') sayZh(c.words[i]);   // 我会写: hear it as you check
    return;
  }
  toggleTick(capId, i, el);
}
async function toggleTick(capId, i, el){
  const c = CAPS.find(x=>x.id===capId);
  if(!c || !c.words || c.words[i]==null) return;
  if(!c.ticks) c.ticks = {};
  const w = c.words[i];
  const nowDone = !c.ticks[w];
  if(nowDone) c.ticks[w] = true; else delete c.ticks[w];
  if(el) el.classList.toggle('done', nowDone);
  try{ await idbPut(c); }catch(e){ toast('⚠️ Could not save tick'); }
  const pr = document.getElementById('prog-'+capId);
  if(pr) pr.textContent = tickCount(c)+' / '+c.words.length+' studied';
  if(nowDone && tickCount(c)===c.words.length){
    let x=innerWidth/2, y=innerHeight/2;
    if(el){ const r=el.getBoundingClientRect(); x=r.left+r.width/2; y=r.top+r.height/2; }
    fxBurst(x,y);

function practiceHTML(){

        <img class="cd-thumb" src="${capURL(c,'thumb')}" alt="">

const LEVELS = ['P1','P2','P3','P4','P5','P6'];
function nextLevel(lv){ const i=LEVELS.indexOf(lv); return (i>=0 && i<LEVELS.length-1) ? LEVELS[i+1] : lv; }
function schoolYear(){ return new Date().getFullYear(); }

    <div class="field"><label>Promote each kid</label>
      ${S.kids.map(k=>`<div class="kidrowitem">
        <span class="dot" style="background:${k.color}"></span>
        <span style="flex:1;font-weight:700">${esc(k.name)} <span class="muted small">· ${esc(k.level)} →</span></span>

      </div>`).join('')}
    </div>
    <div class="muted small" style="background:var(--orange-soft);color:#8a5a10;padding:10px 12px;border-radius:12px;margin-bottom:12px">⚠️ Back up first — this can only be undone by restoring a backup.</div>
    <button class="btn sec" onclick="exportBackup()">⬇️ Back up now</button>
    <button class="btn" style="margin-top:8px" onclick="confirmNewYear(${yr})">🎓 Archive ${yr} &amp; promote</button>
  </div>`;
  m.classList.add('open');
}

async function confirmNewYear(yr){
  const picks = {};
  S.kids.forEach(k=>{ const el=$('ny_'+k.id); picks[k.id] = el ? el.value : nextLevel(k.level); });
  closeModal();
  confirmDlg(`Archive the ${yr} school year and start fresh? Pets, collections and streaks stay. This can only be undone with a backup.`, 'Start new year', async ()=>{
    try{
      for(const k of S.kids){
        if(!k.archives) k.archives = [];
        k.archives.push({
          year: yr, level: k.level,
          syllabus: k.syllabus || {},
          exams: (k.plan && k.plan.exams) || [],
          sessions: LOG.filter(l=>l.kidId===k.id).length,
          best: bestStreak(k),
          pets: (k.collection||[]).length,
          endedOn: todayStr()
        });
        for(const c of CAPS){
          if(c.kidId===k.id && !c.archived){ c.archived=true; c.archivedYear=yr; await idbPut(c); }
        }
        k.level = picks[k.id] || k.level;
        k.syllabus = {};
        k.taughtUpto = {};             // last year's "class is up to here" overrides don't carry over
        seedSyllabusForKid(k, true);   // load the NEW level's default chapters for the fresh year
        if(k.plan){ k.plan.exams=[]; k.plan.blackouts=[]; k.plan.overrides={}; k.plan.anchor=todayStr(); }
      }
      saveS();
      toast('🎓 New school year started!');
      render();
    }catch(err){ toast('⚠️ Rollover failed: '+err.message); }
  });
}

    <div class="field"><label>Level</label><select id="kf_level">
      ${['P1','P2','P3','P4','P5','P6'].map(l=>`<option ${k&&k.level===l?'selected':''}>${l}</option>`).join('')}
    </select></div>
    <div class="field"><label>Colour</label><div class="colorrow" id="kf_colors">
      ${KID_COLORS.map(c=>`<button class="colorsw ${c===color?'on':''}" data-c="${c}" style="background:${c}" onclick="pickKidColor(this)"></button>`).join('')}
    </div></div>
    <div class="field"><label>Subjects</label><div class="chiprow" id="kf_subs">
      ${SUBJECTS.map(s=>`<button class="chip ${subs.includes(s.k)?'on':''}" data-s="${s.k}" onclick="this.classList.toggle('on')">${esc(s.name)}</button>`).join('')}
    </div></div>
    <button class="btn" onclick="saveKid(${k?`'${k.id}'`:'null'})">💾 Save</button>
    ${k && S.kids.length>1 ? `<button class="btn danger" style="margin-top:8px" onclick="askDeleteKid('${k.id}')">🗑 Remove ${esc(k.name)}</button>`:''}
  </div>`;
  m.classList.add('open');
}
function pickKidColor(el){
  el.parentElement.querySelectorAll('.colorsw').forEach(x=>x.classList.remove('on'));
  el.classList.add('on');
}
function saveKid(id){
  const name = $('kf_name').value.trim();
  if(!name){ toast('Give the kid a name'); return; }
  const level = $('kf_level').value;
  const colorEl = document.querySelector('#kf_colors .colorsw.on');
  const color = colorEl ? colorEl.dataset.c : KID_COLORS[0];
  const subjects = [...document.querySelectorAll('#kf_subs .chip.on')].map(x=>x.dataset.s);
  let seeded = 0, target;
  if(id){
    target = kidById(id);
    Object.assign(target, {name, level, color, subjects});
    seeded = seedSyllabusForKid(target);   // fills only subjects still empty (safe on level change)
  }else{
    const nk = {id:uid(), name, level, color, subjects, plan: defaultPlan(subjects)};
    migrateKid(nk);   // give the new kid their own pet, collection & syllabus
    seeded = seedSyllabusForKid(nk);       // pre-load the level's default chapters
    S.kids.push(nk); S.activeKidId = S.activeKidId || nk.id;
  }
  saveS(); closeModal();
  toast(seeded ? `✅ Saved · loaded the ${esc(level)} syllabus (edit in Calendar)` : '✅ Saved');
  render();
}
function askDeleteKid(id){
  const k = kidById(id);
  const n = CAPS.filter(c=>c.kidId===id).length;
  confirmDlg(`Remove ${k.name}? ${n?`Their ${n} capture${n===1?'':'s'} stay in the library.`:'No captures are affected.'}`, 'Remove', ()=>{
    S.kids = S.kids.filter(x=>x.id!==id);
    if(S.activeKidId===id) S.activeKidId = S.kids[0] ? S.kids[0].id : null;
    saveS(); closeModal(); render();
  });
}

/* ---------------- KID MODE ---------------- */
function enterKidMode(){ S.kidMode=true; saveS(); render(); }
function exitKidMode(){ S.kidMode=false; saveS(); render(); }
function renderKidMode(){
  const k = activeKid();
  if(!k){ S.kidMode=false; saveS(); render(); return; }
  document.documentElement.style.setProperty('--kid', k.color);
  const p = planFor(k, todayStr());
  const done = doneOn(k.id, todayStr());
  const st = streak(k);
  const ups = upcomingFor(k.id);

  let todayCard;
  if(p.kind==='study'){
    const s = subjMeta(p.subject);
    const head = p.testDay
      ? `<div class="kc-top"><span class="kc-badge urgent">📝 TEST DAY</span><span class="kc-title">Good luck! 💪</span></div>`

    </div>`;
  } else {
    const msg = p.kind==='blackout' ? '🏝 '+esc(p.label||'Holiday')+' — no study!'
      : p.kind==='busy' ? '🗓 '+esc(p.label||'Busy day')+' — no extra study today.'
      : '🌴 Rest day — no study today!';
    todayCard = `<div class="kidcard"><div class="kc-top"><span class="kc-badge">TODAY</span>
      <span class="kc-title">${msg}</span></div>
      ${petHabitatHTML(k, false, true)}</div>`;
  }

  const night = isNight();
  $('app').innerHTML = `
    <div class="kidpage ${night?'night':''}">
    <div class="skytopwrap">${night?SKY_TOP_NIGHT:SKY_TOP_DAY}</div>
    <div class="hillswrap">${night?HILLS_NIGHT:HILLS_DAY}</div>
    <div class="kidcontent">
    <div class="kidhead">
      <div style="flex:1"><div class="keyebrow">MR 100</div><div class="khi">Hi ${esc(k.name)}! 👋</div>
      <div class="khsub">${ups.length ? '🎒 Here’s your day' : '🥚 Keep feeding your pet!'}</div></div>
      <button class="kidmode-btn" onclick="exitKidMode()">Parent</button>
    </div>
    ${todayCard}
    <div class="kidcard gallerybtn" onclick="openKidGallery()">
      <div style="font-size:30px">🏆</div>
      <div style="flex:1"><div style="font-weight:800;font-size:16px">My pets</div><div class="muted">${(k.collection||[]).length}/${SPECIES.length} collected · tap to open</div></div>
      <div style="font-size:26px;color:var(--kid);font-weight:800">›</div>
    </div>
    ${ups.map(c=>{
      const n = daysUntil(c.testDate); const t = typeMeta(c.type);
      const hasWords = c.words && c.words.length;
      const fed = LOG.some(l=>l.kidId===k.id && l.date===todayStr() && l.practice);
      return `<div class="kidcard">
        <div class="kc-top">
          <span class="kc-badge ${cdClass(n)}">${cdLabel(n)}</span>
          <span class="kc-title">${t.icon} ${esc(subjName(c.subject))} ${esc(t.name)}</span>
        </div>
        <div class="muted">${esc(fmtNice(c.testDate))}${c.note?' · '+esc(c.note):''}</div>
        ${hasWords?`<div style="margin-top:10px;font-weight:800;color:var(--kid)">${fed?'🍎 Practised today — pet fed!':'✏️ Practise your words → feed your pet! 🍎'}</div>
        <div class="prog" id="prog-${c.id}" style="margin-top:6px">${tickCount(c)} / ${c.words.length} studied</div>${tickableWords(c, true)}`:''}
        <img src="${capURL(c,'full')}" alt="" loading="lazy">
      </div>`;
    }).join('')}
    <button class="exitkid" onclick="exitKidMode()">switch to parent view</button>
    </div>
    </div>`;
}

/* ---------------- BACKUP ---------------- */
async function exportBackup(){
  try{
    toast('Preparing backup…');
    const caps = [];
    for(const c of CAPS){
      caps.push({ ...c, image: await blobToDataURL(c.image), thumb: await blobToDataURL(c.thumb) });
    }
    const payload = { app:'MR100', version:VERSION, exportedAt:new Date().toISOString(),
      settings:S, log:LOG, captures:caps };
    const blob = new Blob([JSON.stringify(payload)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'mr-100-backup-' + todayStr() + '.json';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href), 4000);
    S.lastBackupAt = new Date().toISOString(); S.backupSnoozeUntil = 0; saveS();
    toast('✅ Backup downloaded');
    if(TAB==='today') render();
  }catch(err){ toast('⚠️ Backup failed: '+err.message); }
}
function onImportPicked(e){
  const file = e.target.files && e.target.files[0];
  if(!file) return;
  const r = new FileReader();
  r.onload = ()=>{
    let data;
    try{ data = JSON.parse(r.result); }catch(_){ toast('⚠️ Not a valid backup file'); return; }
    if(!data || !['MR100','MRSMCK','SIRSMCK','SIRserious','SIRstudy','MIGIstudy'].includes(data.app) || !Array.isArray(data.captures)){ toast('⚠️ Not a Mr 100 backup'); return; }
    confirmDlg(`Restore backup from ${data.exportedAt ? data.exportedAt.slice(0,10) : '?'} with ${data.captures.length} captures? This replaces everything currently in the app.`, 'Restore', ()=>doImport(data));
  };
  r.readAsText(file);
}
async function doImport(data){
  try{
    for(const c of CAPS){ await idbDelete(c.id); dropURLs(c.id); }
    CAPS = [];
    for(const raw of data.captures){
      const cap = { ...raw, image: dataURLToBlob(raw.image), thumb: dataURLToBlob(raw.thumb) };
      await idbPut(cap); CAPS.push(cap);
    }
    S = data.settings || defaultSettings();
    if(!S.kids) S.kids = [];
    S.kids.forEach(migrateKid);
    S.kidMode = false; saveS();
    LOG = Array.isArray(data.log) ? data.log : [];
    saveLOG();
    toast('✅ Backup restored'); render();
  }catch(err){ toast('⚠️ Restore failed: '+err.message); }
}

/* ---------------- BOOT ---------------- */
/* ---------------- UPDATE CHECK ----------------
   GitHub Pages serves this file with `cache-control: max-age=600`, so Safari will happily show a
   10-minute-old copy of the app — and a home-screen web app can sit on it even longer. There's no
   service worker, so nothing tells it to look again.

   Fix: ask. A cache-busted URL is a different URL, so it skips both Safari's cache and the CDN's
   and always comes back fresh. We fetch our own page, read the VERSION out of it, and if it's
   newer we offer a one-tap reload — also via a cache-busted URL, so the new code loads at once
   instead of waiting out the 10 minutes. Data is untouched: it lives in localStorage/IndexedDB
   on the same origin, so an update never costs the kids their pets, plans or photos. */
let UPD_LAST = 0, UPD_FOUND = null;
async function checkUpdate(manual){
  if(!manual && Date.now() - UPD_LAST < 120000) return;      // at most every 2 min on re-open
  UPD_LAST = Date.now();
  try{
    const r = await fetch(location.pathname + '?v=' + Date.now(), {cache:'no-store'});
    if(!r.ok) throw 0;
    const m = (await r.text()).match(/const VERSION = '([\d.]+)'/);
    if(m && m[1] !== VERSION){ UPD_FOUND = m[1]; showUpdateBar(m[1]); return true; }
    if(manual) toast('✅ You’re on the latest version (v'+VERSION+')');
    return false;
  }catch(e){ if(manual) toast('⚠️ Could not check — are you online?'); return false; }
}
function showUpdateBar(v){
  if($('updbar')) return;
  const d = document.createElement('div');
  d.id = 'updbar';
  d.style.cssText = 'position:fixed;left:10px;right:10px;bottom:78px;z-index:900;display:flex;gap:10px;'+
    'align-items:center;justify-content:space-between;padding:11px 14px;border-radius:14px;'+
    'background:var(--plum,#7c5cb0);color:#fff;box-shadow:0 6px 20px rgba(0,0,0,.25);font-weight:700;font-size:14px';
  d.innerHTML = `<span>🆕 Update ready — v${v}</span>
    <span style="display:flex;gap:6px">
      <button onclick="applyUpdate()" style="border:0;border-radius:9px;padding:7px 12px;font-weight:800;background:#fff;color:#4a3570">Update</button>
      <button onclick="this.closest('#updbar').remove()" style="border:0;border-radius:9px;padding:7px 10px;background:rgba(255,255,255,.22);color:#fff;font-weight:800">Later</button>
    </span>`;
  document.body.appendChild(d);
}
function applyUpdate(){ location.replace(location.pathname + '?v=' + Date.now()); }

async function boot(){
  loadS();
  try{
    DB = await idbOpen();
    CAPS = await idbAll();
  }catch(err){
    CAPS = [];
    console.error('IndexedDB unavailable', err);
  }
  $('photoInput').addEventListener('change', onPhotoPicked);
  $('importInput').addEventListener('change', onImportPicked);
  saveS();            // persist first-run stamp + any migrations
  render();
  fireReminders();    // OS reminders on open (if opted in)
  checkUpdate();      // and tell her if a newer build is live
  document.addEventListener('visibilitychange', ()=>{ if(!document.hidden){ fireReminders(); checkUpdate(); } });
}
boot();
</script>
