<style>
:root{
  --bg:#efe7d7; --card:#faf5ea; --ink:#3a352b; --ink2:#7d7466; --line:#e7dcc7;
  --accent:#9878c9; --accent-soft:#ece5f8;
  --red:#d2669b; --red-soft:#fbe6f0; --orange:#e0a047; --orange-soft:#fbeed6;
  --green:#5fa98c; --green-soft:#e0f0e8;
  --kid:#9878c9; --kid-soft:#ece5f8;
  --rainbow:linear-gradient(120deg,#f19fc2,#e8845c,#e0b877,#67b394,#5b9bd5,#9878c9);
  --radius:18px; --shadow:0 1px 3px rgba(29,43,79,.06),0 8px 22px rgba(29,43,79,.09);
  --sans:system-ui,-apple-system,'Nunito','Segoe UI',Roboto,sans-serif;
  --serif:ui-serif,'Iowan Old Style','Cormorant Garamond','Palatino Linotype',Palatino,Georgia,serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:var(--sans);
  background:var(--bg); color:var(--ink); font-size:16px; line-height:1.45;
  -webkit-font-smoothing:antialiased; overscroll-behavior-y:none;
}
/* all display type uses the same sans as the card headers ("TODAY FOR") */
.logo{letter-spacing:.5px}
button{font:inherit;border:none;background:none;color:inherit;cursor:pointer}
input,select,textarea{font:inherit;color:inherit}
#app{min-height:100%;display:flex;flex-direction:column}

/* ---------- header ---------- */
.hdr{
  position:relative; overflow:hidden;
  padding:calc(env(safe-area-inset-top) + 14px) 18px 22px;
  background:linear-gradient(180deg,#a98fd6 0%, #e3a3bf 46%, #f3e7d1 100%);
  color:#3f2b58; border-radius:0 0 26px 26px;
  box-shadow:0 6px 20px rgba(120,90,150,.26);
  text-shadow:0 1px 3px rgba(255,255,255,.4);
}
.hdr.night{
  background:linear-gradient(180deg,#152354 0%, #2a3d78 55%, #3d5196 100%);
  box-shadow:0 6px 20px rgba(25,35,80,.4);
  color:#fff; text-shadow:0 1px 4px rgba(0,0,0,.4);
}
.hdrscene{position:absolute;inset:0;width:100%;height:100%;z-index:1;pointer-events:none}
.hdrscene .clouds{animation:drift 24s ease-in-out infinite}
@keyframes drift{0%,100%{transform:translateX(-6px)}50%{transform:translateX(8px)}}
.hdr .brand,.hdr .kidbar{position:relative;z-index:2}
.hdr .brand{display:flex;align-items:flex-end;justify-content:space-between;gap:12px}
.hdr .eyebrow{font-size:12px;font-weight:800;letter-spacing:3px;text-transform:uppercase;opacity:.72;line-height:1}
.hdr .headline{font-family:var(--serif);font-size:31px;font-weight:700;line-height:1.05;margin-top:5px}
.hdr .datestr{font-size:12.5px;opacity:.9;margin-top:5px;font-weight:600}
.kidbar{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.kidchip{
  display:flex;align-items:center;gap:7px;padding:7px 14px;border-radius:999px;
  background:rgba(28,45,85,.34);color:#fff;font-weight:700;font-size:14px;
  border:1.5px solid rgba(255,255,255,.55);text-shadow:0 1px 2px rgba(0,0,0,.25);
  -webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px);
}
.kidchip.on{background:#fff;color:var(--ink);border-color:#fff;text-shadow:none;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.kidchip .dot{width:10px;height:10px;border-radius:50%}
.kidmode-btn{flex:none;white-space:nowrap;font-size:12.5px;padding:7px 13px;border-radius:999px;
  background:rgba(28,45,85,.34);color:#fff;font-weight:700;border:1.5px solid rgba(255,255,255,.55);
  text-shadow:0 1px 2px rgba(0,0,0,.25);-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px)}

/* ---------- user guide ---------- */
.gd-card{background:linear-gradient(135deg,#efe9fb,#f7eef2)}
.gd-h{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--ink2);margin:16px 0 4px}
.gd-h:first-child{margin-top:2px}
.gd{border-bottom:1px solid var(--line)}
.gd>summary{list-style:none;cursor:pointer;padding:11px 26px 11px 2px;font-weight:600;font-size:14.5px;position:relative}
.gd>summary::-webkit-details-marker{display:none}
.gd>summary::after{content:'+';position:absolute;right:6px;top:10px;font-size:18px;color:var(--ink2);font-weight:400}
.gd[open]>summary::after{content:'–'}
.gd-a{font-size:14px;line-height:1.6;color:var(--ink2);padding:2px 4px 14px}
.gd-a b{color:var(--ink)}
.gd-ol{margin:6px 0 0 20px;padding:0;display:flex;flex-direction:column;gap:7px}
.gd-ol li{padding-left:3px}
.gd-tip{background:var(--bg);border-radius:10px;padding:9px 11px;margin-top:10px;font-size:13.5px}
/* ---------- nudges / setup checklist ---------- */
.nudgecard{border:1.5px solid var(--accent-soft);background:linear-gradient(135deg,#f3eefb,#faf5ea)}
.nudgeback{border-color:#e9dcbf;background:linear-gradient(135deg,#fbf3e2,#faf5ea)}
.setupstep{display:flex;align-items:center;gap:11px;padding:8px 0;font-size:14.5px;font-weight:600;border-top:1px solid var(--line)}
.setupstep:first-of-type{border-top:none}
.setupstep.on{color:var(--ink2)}
.setupstep .stick{width:22px;height:22px;flex:none;border-radius:50%;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff}
.setupstep.on .stick{background:var(--accent);border-color:var(--accent)}
/* ---------- layout ---------- */
.content{flex:1;padding:16px 16px calc(env(safe-area-inset-bottom) + 92px)}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:14px;border:1px solid rgba(230,235,245,.7)}
.card h3{font-size:12.5px;text-transform:uppercase;letter-spacing:.8px;color:var(--ink2);margin-bottom:11px;font-weight:800}
.muted{color:var(--ink2);font-size:14px}
.small{font-size:13px}
.empty{
  text-align:center;color:var(--ink2);padding:26px 14px;font-size:14.5px;
  border:1.5px dashed var(--line);border-radius:var(--radius);background:transparent;margin-bottom:14px;
}
.empty .big{font-size:34px;margin-bottom:8px}

/* ---------- buttons & chips ---------- */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  background:linear-gradient(180deg,#a68fda,#9878c9 58%,#8360b8);color:#fff;font-weight:700;font-size:16px;
  padding:14px 20px;border-radius:14px;width:100%;
  box-shadow:0 4px 12px rgba(122,90,170,.34), inset 0 1px 0 rgba(255,255,255,.35);
  transition:transform .1s;
}
.btn:active{transform:scale(.98)}
.btn.sec{background:var(--accent-soft);color:var(--accent);box-shadow:none}
.btn.ghost{background:transparent;color:var(--ink2);font-weight:600;box-shadow:none}
.btn.danger{background:var(--red-soft);color:var(--red);box-shadow:none}
.btn.green{background:linear-gradient(180deg,#40b658,#33a24c);box-shadow:0 4px 12px rgba(45,150,70,.32), inset 0 1px 0 rgba(255,255,255,.35)}
.btn.sm{width:auto;padding:9px 14px;font-size:14px;border-radius:11px;box-shadow:none}
.chiprow{display:flex;gap:8px;flex-wrap:wrap}
.chip{
  padding:8px 14px;border-radius:999px;background:var(--bg);border:1.5px solid var(--line);
  font-size:14px;font-weight:600;color:var(--ink2);
}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
.chip.sm{padding:5px 11px;font-size:12.5px}
.chip.xs{padding:5px 9px;font-size:12px;border-radius:9px;box-shadow:none}
.syllist{display:flex;flex-direction:column;gap:8px;max-height:44vh;overflow-y:auto;margin:0 -2px;padding:0 2px}
.sylrow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:8px 10px}
.sylname{flex:1;min-width:120px;font-weight:600;font-size:14px}
.sylterms{display:flex;gap:5px;flex-wrap:wrap}
.sylx{opacity:.5}

/* ---------- forms ---------- */
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:700;color:var(--ink2);margin-bottom:7px;text-transform:uppercase;letter-spacing:.5px}
.field input[type=text],.field input[type=date],.field select,.field textarea{
  width:100%;padding:12px 14px;border-radius:12px;border:1.5px solid var(--line);
  background:var(--card);font-size:16px;-webkit-appearance:none;appearance:none;
}
.field textarea{min-height:96px;resize:vertical}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--accent)}
.colorrow{display:flex;gap:10px}
.colorsw{width:34px;height:34px;border-radius:50%;border:3px solid transparent}
.colorsw.on{border-color:var(--ink)}

/* ---------- today ---------- */
.countdown{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
.countdown:last-child{border-bottom:none;padding-bottom:2px}
.countdown:first-child{padding-top:2px}
.cd-badge{
  min-width:74px;text-align:center;font-weight:800;font-size:13px;
  padding:7px 8px;border-radius:10px;background:var(--accent-soft);color:var(--accent);flex-shrink:0;
}
.cd-badge.urgent{background:var(--red-soft);color:var(--red)}
.cd-badge.soon{background:var(--orange-soft);color:var(--orange)}
.cd-main{flex:1;min-width:0}
.cd-title{font-weight:700;font-size:15px}
.cd-sub{font-size:13px;color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cd-thumb{width:46px;height:46px;border-radius:10px;object-fit:cover;background:var(--bg);flex-shrink:0}
.todayplan{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.tp-icon{font-size:30px}
.tp-main{flex:1}
.tp-title{font-size:19px;font-weight:800}
.tp-why{font-size:13px;color:var(--ink2)}
.nudgewrap{margin-top:12px;display:flex;flex-direction:column;gap:8px}
.nudge{display:flex;align-items:center;gap:10px;background:var(--accent-soft);border-radius:12px;padding:10px 12px}
.nudge-main{flex:1;font-size:13.5px;line-height:1.3}
.nudge .btn{width:auto;flex-shrink:0}
.streak{font-size:13.5px;font-weight:700;color:var(--orange)}
.donebox{
  background:var(--green-soft);border-radius:12px;padding:14px;text-align:center;
  font-weight:800;color:var(--green);font-size:16px;
}
.donebox .undo{display:block;font-size:12px;color:var(--ink2);font-weight:600;margin-top:4px}
.testbanner{
  background:linear-gradient(135deg,#dc2626,#f97316);color:#fff;border-radius:var(--radius);
  padding:16px;margin-bottom:14px;font-weight:800;font-size:16px;box-shadow:var(--shadow);
}
.testbanner .small{font-weight:600;opacity:.9}
.donewrap{text-align:center;padding:6px 0 2px}
.donecircle{
  width:168px;height:168px;border-radius:50%;
  background:radial-gradient(circle at 32% 28%, #34d399, #059669);
  color:#fff;font-size:16px;font-weight:800;
  box-shadow:0 10px 28px rgba(5,150,105,.45), inset 0 -8px 18px rgba(0,0,0,.18);
  display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  transition:transform .12s; animation:pulse 2.4s ease-in-out infinite;
}
.donecircle:active{transform:scale(.86)}
.donecircle .em{font-size:52px;line-height:1}
.donecircle.isdone{
  background:radial-gradient(circle at 32% 28%, #fcd34d, #f59e0b);
  box-shadow:0 10px 28px rgba(245,158,11,.45), inset 0 -8px 18px rgba(0,0,0,.14);
  animation:none;
}
.donecircle.xl{width:210px;height:210px;font-size:18px}
.donecircle.xl .em{font-size:66px}
@keyframes pulse{
  0%,100%{box-shadow:0 10px 28px rgba(5,150,105,.45), inset 0 -8px 18px rgba(0,0,0,.18)}
  50%{box-shadow:0 10px 40px rgba(5,150,105,.75), inset 0 -8px 18px rgba(0,0,0,.18)}
}
.bigstreak{font-size:16px;font-weight:800;color:var(--orange);margin-top:8px}
.undosm{background:none;font-size:12px;color:var(--ink2);font-weight:600;margin-top:4px;display:inline-block}
#fx{position:fixed;inset:0;pointer-events:none;z-index:90}

/* ---------- pet habitat ---------- */
.habitat{
  text-align:center;border-radius:20px;padding:16px 14px 14px;margin-top:6px;position:relative;
  background:linear-gradient(180deg,#c6abe4 0%, #eec2d4 52%, #f6ead4 100%);
  border:1px solid #d7c4ea;
  container-type:inline-size;
}
.habitat.night{
  background:linear-gradient(180deg,#1e2e5c 0%, #33467d 60%, #445699 100%);
  border-color:#3a4c86;
}
.habitat.night .petname{color:#fff}
.habitat.night .petto,.habitat.night .dragrow{color:rgba(255,255,255,.8)}
.habitat.night .petbar,.habitat.night .happybar{background:rgba(255,255,255,.22)}
/* pet fills ~3/4 of the habitat card on its larger dimension (cqw = % of .habitat width) */
.pet{--petsize:62px;--petsize:min(78cqw,300px);
  font-size:var(--petsize);line-height:1;display:inline-block;cursor:pointer;
  filter:drop-shadow(0 6px 8px rgba(70,50,130,.18));animation:petfloat 3.6s ease-in-out infinite;
  -webkit-user-select:none;user-select:none;touch-action:manipulation}
.pet.xl{--petsize:84px;--petsize:min(84cqw,340px)}
.pet .petimg{width:var(--petsize);height:var(--petsize);object-fit:contain}
.pet:active{transform:scale(.9)}
.pet.egg{animation:eggwobble 2.6s ease-in-out infinite}
.pet.egg.close{animation:eggwobble 0.5s ease-in-out infinite}
.pet.bounce{animation:petbounce .55s ease}
@keyframes petfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes eggwobble{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}
@keyframes petbounce{0%{transform:scale(1)}25%{transform:scale(1.28) translateY(-10px) rotate(-6deg)}55%{transform:scale(.93) rotate(4deg)}100%{transform:scale(1)}}
.petbubble{
  position:absolute;left:50%;top:6px;z-index:6;margin:0;max-width:200px;pointer-events:none;
  background:var(--card);color:var(--ink);font-weight:800;font-size:14px;
  padding:6px 13px;border-radius:14px;box-shadow:0 3px 10px rgba(70,50,130,.18);
  opacity:0;transform:translateX(-50%) translateY(6px) scale(.8);transition:all .18s}
.petbubble::after{content:'';position:absolute;left:50%;bottom:-5px;transform:translateX(-50%);
  border:6px solid transparent;border-top-color:var(--card);border-bottom:0}
.petbubble.show{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
.floaty{position:fixed;z-index:95;pointer-events:none;font-size:24px;animation:floatup 1.1s ease-out forwards}
@keyframes floatup{0%{opacity:1;transform:translateY(0) scale(.6)}30%{opacity:1;transform:translateY(-18px) scale(1.1)}100%{opacity:0;transform:translateY(-64px) scale(1)}}
.petwrap{position:relative;display:inline-flex;align-items:center;justify-content:center}
.petimg{height:1em;width:auto;vertical-align:middle;display:inline-block}
.blob{display:inline-block;width:.86em;height:.78em;vertical-align:middle;position:relative;
  border-radius:52% 48% 46% 54% / 60% 58% 44% 42%;
  background:radial-gradient(circle at 38% 30%, rgba(255,255,255,.6), var(--bc) 66%);
  box-shadow:inset 0 -.08em .14em rgba(0,0,0,.16), 0 .05em .1em rgba(0,0,0,.12);
  animation:blobwobble 2.8s ease-in-out infinite}
.blob.big{width:1em;height:.9em}
.blob .be{position:absolute;width:.13em;height:.16em;background:#3b3550;border-radius:50%;top:.34em}
.blob .be:nth-child(1){left:.28em}
.blob .be:nth-child(2){right:.28em}
@keyframes blobwobble{0%,100%{border-radius:52% 48% 46% 54% / 60% 58% 44% 42%}50%{border-radius:48% 52% 52% 48% / 56% 60% 42% 46%;transform:scaleY(.96)}}
.petacc{position:absolute;top:-6px;right:-10px;font-size:.42em;transform:rotate(12deg);filter:drop-shadow(0 2px 3px rgba(0,0,0,.2))}
.petzzz{position:absolute;top:-2px;right:-16px;font-size:.3em;animation:zzz 3s ease-in-out infinite;opacity:.9}
@keyframes zzz{0%,100%{opacity:.3;transform:translateY(2px)}50%{opacity:1;transform:translateY(-4px)}}
.moodpill{display:inline-block;font-size:11.5px;font-weight:800;padding:3px 10px;border-radius:999px;margin-top:6px}
.moodpill.sleepy{background:#e7ecff;color:#4356a8}
.moodpill.excited{background:#ffe9d6;color:#d9700f}
.happywrap{max-width:200px;margin:8px auto 0}
.happylbl{font-size:11px;font-weight:800;color:var(--ink2);margin-bottom:3px}
.happyrow{display:flex;align-items:center;gap:7px;max-width:200px;margin:9px auto 0}
.happyrow .hf{font-size:15px;line-height:1;flex-shrink:0}
.happyrow .happybar{flex:1}
.happybar{height:9px;border-radius:99px;background:rgba(90,60,120,.2);overflow:hidden}
.happybar > i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,#ff6b9d,#ff9770,#ffd23b);transition:width .3s}
.dragrow{margin-top:12px;font-size:13px;font-weight:700;color:var(--ink2);display:flex;align-items:center;justify-content:center;gap:8px}
.foodchip{font-size:34px;cursor:grab;touch-action:none;-webkit-user-select:none;user-select:none;display:inline-block;animation:foodbob 1.8s ease-in-out infinite}
.foodchip:active{cursor:grabbing}
@keyframes foodbob{0%,100%{transform:translateY(0) rotate(-6deg)}50%{transform:translateY(-4px) rotate(6deg)}}
.dragfood{position:fixed;z-index:96;font-size:40px;pointer-events:none;transform:translate(-50%,-50%);filter:drop-shadow(0 4px 6px rgba(0,0,0,.25))}
.pet.hungry{animation:petshake .4s ease-in-out infinite}
@keyframes petshake{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px) rotate(-3deg)}75%{transform:translateX(3px) rotate(3deg)}}
.petname{font-weight:800;font-size:15px;margin-top:5px}
.petto{font-size:12px;color:var(--ink2);margin-top:2px}
.petbar{height:9px;border-radius:99px;background:rgba(90,60,120,.2);overflow:hidden;margin:9px auto 0;max-width:220px}
.petbar > i{display:block;height:100%;border-radius:99px;background:var(--rainbow);transition:width .5s}
.feedbtn{
  position:relative;width:auto;max-width:100%;margin:14px auto 0;padding:11px 20px;border-radius:999px;
  background:linear-gradient(180deg,#68d178 0%, #40b658 52%, #33a24c 100%);
  color:#fff;font-size:15px;font-weight:800;letter-spacing:.2px;
  border:1.5px solid rgba(255,255,255,.4);
  box-shadow:0 6px 15px rgba(40,150,70,.42), inset 0 1px 0 rgba(255,255,255,.5);
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  text-shadow:0 1px 2px rgba(0,60,20,.3);
  animation:feedpulse 2.4s ease-in-out infinite;
}
.feedbtn:active{transform:scale(.95);animation:none}
.feedbtn.xl{font-size:16px;padding:13px 24px}
.feedbtn.blue{
  background:linear-gradient(180deg,#5fa8ff 0%, #3a86ff 55%, #2f77ee 100%);
  box-shadow:0 9px 22px rgba(45,110,220,.45), inset 0 2px 0 rgba(255,255,255,.5), inset 0 -3px 7px rgba(0,30,90,.18);
  animation:none;
}
@keyframes feedpulse{
  0%,100%{box-shadow:0 6px 15px rgba(40,150,70,.42), inset 0 1px 0 rgba(255,255,255,.5)}
  50%{box-shadow:0 8px 20px rgba(40,150,70,.62), inset 0 1px 0 rgba(255,255,255,.5)}
}
.feddone{background:var(--green-soft);color:#15803d;border-radius:16px;padding:14px;font-weight:800;margin-top:14px;max-width:280px;margin-left:auto;margin-right:auto}
.feddone .undo{display:block;font-size:12px;color:var(--ink2);font-weight:600;margin-top:4px}
.petstrip{display:flex;align-items:center;gap:12px;background:var(--card);border-radius:16px;padding:12px 14px;margin-top:12px;border:1.5px solid var(--line)}
.petstrip .pe{font-size:38px}
.collectrow{display:flex;flex-wrap:wrap;gap:10px}
.collectitem{width:66px;border-radius:14px;background:var(--accent-soft);display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 4px}
.collectitem .e{font-size:30px;line-height:1}
.collectitem .cn{font-size:9.5px;font-weight:800;color:var(--ink2);text-align:center;line-height:1.1}
.collectitem.locked{background:var(--bg);opacity:.65}
.collectitem.got{background:var(--green-soft);box-shadow:0 2px 8px rgba(34,197,94,.18)}
.collectitem.growing{background:var(--accent-soft);box-shadow:inset 0 0 0 1.5px var(--accent)}
.linkbtn{background:none;font-size:13px;font-weight:700;color:var(--ink2);text-decoration:underline;text-underline-offset:3px;padding:4px}
.pgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.pgrid .collectitem{width:auto}
#celebrate{position:fixed;inset:0;z-index:75;display:none;align-items:center;justify-content:center;padding:28px}
#celebrate.open{display:flex}
#celebrate .cb{position:absolute;inset:0;background:rgba(44,35,82,.55)}
#celebrate .cc{position:relative;background:var(--card);border-radius:24px;padding:28px 22px;max-width:340px;width:100%;text-align:center;box-shadow:var(--shadow)}
#celebrate .cc .big{font-size:82px;line-height:1;margin-bottom:8px}
#celebrate .cc h2{font-size:22px;font-weight:800;margin-bottom:6px}
#celebrate .cc p{color:var(--ink2);font-size:15px;margin-bottom:18px}

/* ---------- calendar ---------- */
.calnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.calnav .mon{font-weight:800;font-size:16px}
.calnav .nb{width:38px;height:38px;border-radius:12px;background:var(--bg);font-size:17px;font-weight:800;color:var(--ink2)}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.calhead{text-align:center;font-size:10.5px;font-weight:800;color:var(--ink2);padding:2px 0}
.calcell{
  aspect-ratio:.92;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;font-size:12.5px;font-weight:700;padding:0;background:transparent;
}
.calcell.off{opacity:0;pointer-events:none}
.calcell.today{border:2px solid var(--accent);background:var(--accent-soft)}
.calcell{padding-top:3px}
.calcell .daynum{font-size:12px;line-height:1}
.calcell .mark{font-size:11px;height:15px;line-height:1;display:flex;align-items:center;justify-content:center}
.calcell .slab{font-size:8.5px;font-weight:800;line-height:1;padding:1.5px 4px;border-radius:5px}
.calcell .mark.miss{color:#c3c7d6;font-size:10px}
.callegend{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.callegend .lg{font-size:10.5px;font-weight:800;padding:2px 7px;border-radius:6px}
.statrow{display:flex;gap:10px;margin-bottom:14px}
.stat{flex:1;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:12px 8px;text-align:center}
.stat .v{font-size:22px;font-weight:800}
.stat .l{font-size:11px;font-weight:700;color:var(--ink2);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

/* ---------- plan tab ---------- */
.dayrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
.dayrow:last-child{border-bottom:none}
.dayrow .d1{width:66px;flex-shrink:0;font-weight:700;font-size:13px}
.dayrow .d1 .small{font-weight:600;color:var(--ink2)}
.dayrow.today-row{background:var(--accent-soft);margin:0 -8px;padding:9px 8px;border-radius:10px;border-bottom:none}
.subbadge{padding:4px 10px;border-radius:8px;font-size:12.5px;font-weight:800;flex-shrink:0}
.dayrow .why{flex:1;font-size:12.5px;color:var(--ink2);min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dayrow .tick{font-size:15px}
.rowline{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
.rowline:last-child{border-bottom:none}
.rowline .grow{flex:1;min-width:0}
.rowline .t{font-weight:700;font-size:15px}
.rowline .s{font-size:12.5px;color:var(--ink2)}

/* ---------- capture ---------- */
.snapbtn{
  width:100%;padding:26px 20px;border-radius:var(--radius);border:2px dashed var(--accent);
  background:var(--accent-soft);color:var(--accent);font-weight:800;font-size:17px;
  display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:16px;
}
.snapbtn svg{width:34px;height:34px}
.preview{width:100%;max-height:300px;object-fit:contain;border-radius:12px;background:#0b0c14;margin-bottom:14px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.gitem{position:relative;aspect-ratio:1;border-radius:12px;overflow:hidden;background:var(--card);box-shadow:var(--shadow);border:none;padding:0}
.gitem img{width:100%;height:100%;object-fit:cover;display:block}
.gitem .tag{
  position:absolute;left:5px;bottom:5px;right:5px;display:flex;gap:4px;align-items:center;
  font-size:10px;font-weight:800;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.7);
}
.gitem .tag .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;box-shadow:0 0 0 1.5px rgba(255,255,255,.9)}
.gitem .datechip{
  position:absolute;top:5px;right:5px;font-size:9.5px;font-weight:800;color:#fff;
  background:rgba(220,38,38,.92);padding:2px 6px;border-radius:7px;
}
.gitem .datechip.past{background:rgba(20,22,40,.55)}
.gitem.archived{opacity:.45}

/* ---------- modal ---------- */
#modal{position:fixed;inset:0;z-index:60;display:none}
#modal.open{display:block}
.mback{position:absolute;inset:0;background:rgba(15,16,30,.55)}
.msheet{
  position:absolute;left:0;right:0;bottom:0;max-height:92%;overflow-y:auto;
  background:var(--bg);border-radius:22px 22px 0 0;
  padding:18px 18px calc(env(safe-area-inset-bottom) + 22px);
}
.msheet .grab{width:40px;height:4px;border-radius:2px;background:var(--line);margin:0 auto 14px}
.mimg{width:100%;border-radius:12px;margin-bottom:14px;background:#0b0c14}
.metarow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.wordlist{display:flex;flex-wrap:wrap;gap:8px;margin:4px 0 8px}
.word{padding:8px 14px;border-radius:11px;background:var(--card);box-shadow:var(--shadow);font-weight:700;font-size:16px;border:1.5px solid transparent}
.word.big{font-size:19px;padding:12px 18px;border-radius:13px}
.word.done{background:var(--green-soft);color:var(--green);border-color:var(--green)}
.word.done::before{content:'✓ '}
/* 听写 flip-cards: prompt on the front, answer revealed on tap */
.pgroup{margin:10px 0 14px}
.pgroup h4{font-size:14px;font-weight:800;margin-bottom:2px}
.pgroup .ph{font-size:12px;color:var(--ink2);margin-bottom:8px}
.pcards{display:flex;flex-wrap:wrap;gap:9px}
.pcard{position:relative;min-width:74px;padding:11px 14px;border-radius:13px;background:var(--card);
  box-shadow:var(--shadow);border:1.5px solid transparent;text-align:center;line-height:1.25}
.pcard .q{display:block;font-weight:800;font-size:23px}
.pcard.recog .q{font-size:30px}
.pcard .a{display:none;font-size:14px;font-weight:700;color:var(--plum);margin-top:3px}
.pcard .hint{display:block;font-size:11px;color:var(--ink2);margin-top:3px;font-weight:600}
.pcard.shown .a{display:block}
.pcard.shown .hint{display:none}
.pcard.done{background:var(--green-soft);border-color:var(--green)}
.pcard.done .a{color:var(--green)}
.pcard .say{position:absolute;top:3px;right:5px;font-size:13px;opacity:.5}
.prog{font-size:13.5px;font-weight:800;color:var(--ink2);margin-bottom:8px}

/* ---------- tabbar ---------- */
.tabbar{
  position:fixed;left:0;right:0;bottom:0;z-index:50;
  background:rgba(250,245,234,.94);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);
  border-top:1px solid var(--line);
  display:flex;padding:8px 6px calc(env(safe-area-inset-bottom) + 8px);
}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;color:#9aa0b5;font-size:10.5px;font-weight:700;padding:5px 0;position:relative;transition:color .15s}
.tab svg{width:23px;height:23px;transition:transform .15s}
.tab.on{color:var(--accent)}
.tab.on svg{transform:translateY(-1px) scale(1.08)}
.tab.on::before{content:'';position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:26px;height:4px;border-radius:0 0 6px 6px;background:var(--accent)}
.tab .soon{font-size:8px;background:var(--line);color:var(--ink2);padding:1px 5px;border-radius:6px;font-weight:800}

/* ---------- setup ---------- */
.setup{max-width:430px;margin:0 auto;padding:calc(env(safe-area-inset-top) + 40px) 22px 60px}
.setup .hero{text-align:center;margin-bottom:28px}
.setup .hero .mark{
  width:84px;height:84px;border-radius:22px;object-fit:cover;display:block;margin:0 auto 14px;
  box-shadow:0 8px 22px rgba(120,90,60,.28);
}
.setup .hero .mark .m1{font-size:28px;font-weight:800;line-height:1}
.setup .hero .mark .m2{font-size:10px;font-weight:700;letter-spacing:1px;opacity:.95;line-height:1}
.setup h1{font-size:30px;font-weight:800;font-family:var(--serif);color:#7a5aa0;letter-spacing:.5px}
.setup .sub{color:var(--ink2);margin-top:6px;font-size:15px}
.kidrowitem{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--line)}
.kidrowitem:last-child{border-bottom:none}
.kidrowitem .dot{width:12px;height:12px;border-radius:50%}

/* ---------- kid mode (full-page sky world) ---------- */
.kidpage{position:relative;min-height:100vh;overflow:hidden;
  background:linear-gradient(180deg,#a98fd6 0%,#e3a3bf 34%,#f3e7d1 66%,#e3ecd3 100%)}
.kidpage.night{background:linear-gradient(180deg,#152354 0%,#2a3d78 40%,#3d5196 74%,#21402b 100%)}
.skytopwrap{position:absolute;top:0;left:0;right:0;height:150px;z-index:1;pointer-events:none}
.skytop{width:100%;height:100%}
.skytop .clouds{animation:drift 24s ease-in-out infinite}
.hillswrap{position:fixed;left:0;right:0;bottom:0;height:104px;z-index:1;pointer-events:none}
.hillsvg{width:100%;height:100%}
.kidcontent{position:relative;z-index:2;padding:calc(env(safe-area-inset-top) + 22px) 16px 118px}
.kidhead{display:flex;align-items:flex-start;gap:10px;margin-bottom:16px;color:#3f2b58;text-shadow:0 1px 3px rgba(255,255,255,.4)}
.kidpage.night .kidhead{color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.4)}
.kidhead .keyebrow{font-size:11px;font-weight:800;letter-spacing:3px;text-transform:uppercase;opacity:.72;line-height:1}
.kidhead .khi{font-family:var(--serif);font-size:29px;font-weight:700;line-height:1.05;margin-top:4px}
.kidhead .khsub{font-size:13.5px;opacity:.85;margin-top:4px;font-weight:600}
.kidwrap{min-height:100%;padding:calc(env(safe-area-inset-top) + 26px) 18px 40px}
.kidwrap .hi{font-size:28px;font-weight:800;margin-bottom:4px}
.kidwrap .hisub{color:var(--ink2);margin-bottom:20px;font-size:15px}
.kidcard{background:var(--card);border-radius:20px;box-shadow:var(--shadow);padding:18px;margin-bottom:14px}
.gallerybtn{display:flex;align-items:center;gap:12px;cursor:pointer;transition:transform .1s}
.gallerybtn:active{transform:scale(.98)}
.kidcard .kc-top{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.kidcard .kc-badge{font-weight:800;font-size:14px;padding:8px 12px;border-radius:11px;background:var(--accent-soft);color:var(--accent)}
.kidcard .kc-badge.urgent{background:var(--red-soft);color:var(--red)}
.kidcard .kc-badge.soon{background:var(--orange-soft);color:var(--orange)}
.kidcard .kc-title{font-size:18px;font-weight:800}
.kidcard img{width:100%;border-radius:12px;margin-top:8px}
.bigdone{
  width:100%;padding:20px;border-radius:18px;background:var(--green);color:#fff;
  font-size:19px;font-weight:800;margin-top:4px;
}
.bigdone:active{transform:scale(.97)}
.exitkid{display:block;text-align:center;color:#fff;opacity:.9;font-size:13px;font-weight:700;margin-top:24px;width:100%;text-shadow:0 1px 3px rgba(20,60,120,.4)}

/* ---------- toast & confirm ---------- */
#toast{
  position:fixed;left:50%;transform:translateX(-50%) translateY(20px);bottom:calc(env(safe-area-inset-bottom) + 100px);
  background:var(--ink);color:#fff;padding:11px 20px;border-radius:999px;font-size:14px;font-weight:600;
  opacity:0;pointer-events:none;transition:all .25s;z-index:80;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#confirm{position:fixed;inset:0;z-index:70;display:none;align-items:center;justify-content:center;padding:30px}
#confirm.open{display:flex}
#confirm .cback{position:absolute;inset:0;background:rgba(15,16,30,.55)}
#confirm .cbox{position:relative;background:var(--card);border-radius:18px;padding:22px;max-width:330px;width:100%;box-shadow:var(--shadow)}
#confirm .cbox p{font-size:15.5px;margin-bottom:18px}
#confirm .cbtns{display:flex;gap:10px}
#confirm .cbtns .btn{padding:11px}
</style>
</head>

// fill a kid's syllabus from the library; by default only fills subjects that are still empty
function seedSyllabusForKid(kid, overwrite){
  const lib = CURRICULUM[kid.level]; if(!lib) return 0;
  if(!kid.syllabus) kid.syllabus = {};
  let filled = 0;
  (kid.subjects && kid.subjects.length ? kid.subjects : SUBJECTS.map(s=>s.k)).forEach(sk=>{
    const def = lib[sk];
    if(def && def.length && (overwrite || !(kid.syllabus[sk] && kid.syllabus[sk].length))){
      kid.syllabus[sk] = def.map(c=>({t:c.t, term:c.term}));
      filled++;
    }
  });
  return filled;
}

  return src ? `<img src="${src}" alt="" style="height:${big?30:26}px;width:auto">` : SPECIES[i].e;
}
// pet mood: excited near a test wins over sleepy at night
function daysToNextTest(kid){
  let best = 99;
  CAPS.filter(c=>c.kidId===kid.id && !c.archived && c.testDate).forEach(c=>{ const g=daysUntil(c.testDate); if(g>=0) best=Math.min(best,g); });
  (kid.plan.exams||[]).forEach(e=>{ const g=daysUntil(e.date); if(g>=0) best=Math.min(best,g); });
  return best;
}
function petMood(kid){
  if(daysToNextTest(kid) <= 2) return 'excited';
  if(isNight()) return 'sleepy';
  return 'normal';
}
function petAccessory(kid){
  const col = (kid.collection||[]).length, st = streak(kid);
  if(col >= 5) return '👑';
  if(st >= 14) return '🎓';
  if(st >= 7)  return '⭐';
  if(col >= 1) return '🎀';
  return '';
}
function patState(kid){
  if(!kid.pet.patDate || kid.pet.patDate !== todayStr()){ kid.pet.patDate = todayStr(); kid.pet.pats = 0; }
  return kid.pet.pats || 0;
}
function petLabel(k){
  const st = petStage(k.pet.fed), nm = SPECIES[k.pet.sp].name;
  // the animal stays a SECRET until it becomes an adult (stage 2)
  return st===0 ? `Mystery egg` : st===1 ? `Mystery blob 🫧` : `${nm} ⭐`;
}

/* ---------------- tiny helpers ---------------- */
const $ = id => document.getElementById(id);
const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const uid = () => 'c' + Date.now().toString(36) + Math.random().toString(36).slice(2,8);
function dToStr(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function todayStr(){ return dToStr(new Date()); }
function strToDate(ds){ const [y,m,d]=ds.split('-').map(Number); return new Date(y,m-1,d); }
function gapDays(fromStr, toStr){ return Math.round((strToDate(toStr)-strToDate(fromStr))/86400000); }
function daysUntil(dateStr){ return gapDays(todayStr(), dateStr); }
function fmtNice(dateStr){ return strToDate(dateStr).toLocaleDateString('en-SG',{weekday:'short',day:'numeric',month:'short'}); }
function cdLabel(n){
  if(n===0) return 'TODAY';
  if(n===1) return 'tomorrow';
  if(n<0) return Math.abs(n)+'d ago';
  return 'in '+n+' days';
}
function cdClass(n){ return n<=1 ? 'urgent' : (n<=3 ? 'soon' : ''); }
// Singapore primary school terms (approx 2026 windows) — by MM-DD
function currentTerm(ds){
  const md = (ds||todayStr()).slice(5);
  if(md < '03-14') return 1;
  if(md < '05-30') return 2;
  if(md < '09-05') return 3;
  return 4;
}
function termName(t){ return 'Term '+t; }
// Actual TEACHING weeks per term (school is out during the breaks, so these are NOT the same as
// the currentTerm() boundaries above — e.g. currentTerm says "Term 3" from 30 May, but the class
// doesn't resume until end-June after the long break). Used to estimate how far the class has got.
const TERM_TEACH = { 1:{s:'01-02', e:'03-13'}, 2:{s:'03-23', e:'05-29'}, 3:{s:'06-29', e:'09-04'}, 4:{s:'09-14', e:'11-20'} };
function termSpan(term, ds){
  const y = (ds||todayStr()).slice(0,4), w = TERM_TEACH[term] || TERM_TEACH[1];
  return {start: y+'-'+w.s, end: y+'-'+w.e};
}
function termProgress(ds){
  // how far through the current term's teaching weeks we are, 0 → 1 (0 while the term hasn't started)
  const sp = termSpan(currentTerm(ds), ds);
  const total = gapDays(sp.start, sp.end) || 1;
  return Math.max(0, Math.min(1, gapDays(sp.start, ds) / total));
}
function termWeek(ds){
  const sp = termSpan(currentTerm(ds), ds);
  const d = gapDays(sp.start, ds);
  if(d < 0) return 0;                                    // still on break
  const wks = Math.floor(gapDays(sp.start, sp.end)/7) + 1;
  return Math.min(wks, Math.floor(d/7) + 1);
}
function termWeeks(ds){ const sp = termSpan(currentTerm(ds), ds); return Math.floor(gapDays(sp.start, sp.end)/7) + 1; }
function yearProgress(ds){
  // how far through the school YEAR's ~40 teaching weeks we are. Used to pace chapters that carry
  // no T1–T4 tag (the default — chapters load untagged), so an untagged list still can't run ahead.
  const done = 10*(currentTerm(ds)-1) + termWeek(ds);   // termWeek is 0 while school is on break
  return Math.max(0, Math.min(1, done/40));
}
function subjMeta(k){ return SUBJECTS.find(x=>x.k===k) || {k, name:k, color:'#6b7085'}; }

/* ---------------- settings & log ---------------- */
function defaultRhythm(){
  // Mon–Sat available for study, Sunday rest — days say WHEN, the mix says WHAT
  const r = {};
  [1,2,3,4,5,6].forEach(wd=>{ r[wd] = {mode:'avail'}; });
  r[0] = {mode:'rest'};
  return r;
}
function defaultPlan(subjects){
  const mix = {};
  (subjects && subjects.length ? subjects : SUBJECTS.map(s=>s.k)).forEach(s=>{ mix[s]=1; });
  return { exams:[], rhythm: defaultRhythm(), blackouts:[], mix, mins:20, overrides:{}, anchor: todayStr() };
}
function migrateKid(k){
  if(!k.plan){ k.plan = defaultPlan(k.subjects); return; }
  const P = k.plan;
  if(!P.mix){
    // v0.2/0.3 plans pinned a subject to each weekday — convert those picks
    // into mix weights and free the days up
    P.mix = {}; const counts = {};
    Object.values(P.rhythm||{}).forEach(r=>{ if(r && r.mode==='study' && r.subject) counts[r.subject]=(counts[r.subject]||0)+1; });
    const subs = (k.subjects && k.subjects.length) ? k.subjects : SUBJECTS.map(s=>s.k);
    subs.forEach(s=>{ P.mix[s] = counts[s] || 1; });
    Object.keys(P.rhythm||{}).forEach(wd=>{ if(P.rhythm[wd] && P.rhythm[wd].mode==='study') P.rhythm[wd] = {mode:'avail'}; });
  }
  if(!P.mins) P.mins = 20;
  if(!P.overrides) P.overrides = {};
  if(!P.anchor) P.anchor = todayStr();
  if(!k.syllabus) k.syllabus = {};   // {subjectKey: [{t:'topic', term:3|null}]}
  if(!k.collection) k.collection = [];
  if(!k.pet){
    // seed the pet with however many study days already logged (migration)
    const fed = LOG.filter(l=>l.kidId===k.id).length % ADULT;
    k.pet = { sp: pickSpecies(k), fed };
  }
}
function defaultSettings(){
  return { version:VERSION, setupDone:false, kids:[], activeKidId:null, kidMode:false };
}
function loadS(){
  try{ const raw=localStorage.getItem(LS_KEY); S = raw ? JSON.parse(raw) : defaultSettings(); }
  catch(e){ S = defaultSettings(); }
  if(!S.kids) S.kids=[];
  S.kids.forEach(migrateKid);
  // one-time: drop the old English chapter syllabus (English isn't chapter-based)
  if(!S.enSylCleared){ S.kids.forEach(k=>{ if(k.syllabus) delete k.syllabus.EN; }); S.enSylCleared=true; }
  if(!S.firstRunAt) S.firstRunAt = new Date().toISOString();
  try{ LOG = JSON.parse(localStorage.getItem(LOG_KEY)) || []; }catch(e){ LOG=[]; }
}
function saveS(){ localStorage.setItem(LS_KEY, JSON.stringify(S)); }
function saveLOG(){ localStorage.setItem(LOG_KEY, JSON.stringify(LOG)); }

/* ---------------- IndexedDB ---------------- */
function idbOpen(){
  return new Promise((res,rej)=>{
    const rq = indexedDB.open('migistudy', 1);
    rq.onupgradeneeded = e => {
      const db = e.target.result;
      if(!db.objectStoreNames.contains('captures')) db.createObjectStore('captures',{keyPath:'id'});
    };
    rq.onsuccess = e => res(e.target.result);
    rq.onerror = () => rej(rq.error);
  });
}
function idbPut(cap){
  return new Promise((res,rej)=>{
    const tx = DB.transaction('captures','readwrite');
    tx.objectStore('captures').put(cap);
    tx.oncomplete = res; tx.onerror = ()=>rej(tx.error);
  });
}
function idbDelete(id){
  return new Promise((res,rej)=>{
    const tx = DB.transaction('captures','readwrite');
    tx.objectStore('captures').delete(id);
    tx.oncomplete = res; tx.onerror = ()=>rej(tx.error);
  });
}
function idbAll(){
  return new Promise((res,rej)=>{
    const rq = DB.transaction('captures').objectStore('captures').getAll();
    rq.onsuccess = ()=>res(rq.result||[]); rq.onerror = ()=>rej(rq.error);
  });
}

/* ---------------- image handling ---------------- */
function loadImageFromFile(file){
  return new Promise((res,rej)=>{
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = ()=>res({img,url});
    img.onerror = ()=>{ URL.revokeObjectURL(url); rej(new Error('Could not read that image')); };
    img.src = url;
  });
}
function scaleToBlob(img, maxEdge, quality){
  return new Promise(res=>{
    const r = Math.min(1, maxEdge / Math.max(img.naturalWidth, img.naturalHeight));
    const w = Math.max(1, Math.round(img.naturalWidth*r)), h = Math.max(1, Math.round(img.naturalHeight*r));
    const cv = document.createElement('canvas'); cv.width=w; cv.height=h;
    cv.getContext('2d').drawImage(img,0,0,w,h);
    cv.toBlob(b=>res(b), 'image/jpeg', quality);
  });
}
function capURL(cap, kind){
  let entry = URLCACHE.get(cap.id);
  if(!entry){ entry={}; URLCACHE.set(cap.id, entry); }
  if(!entry[kind]) entry[kind] = URL.createObjectURL(kind==='thumb' ? cap.thumb : cap.image);
  return entry[kind];
}
function dropURLs(id){
  const e = URLCACHE.get(id);
  if(e){ if(e.thumb)URL.revokeObjectURL(e.thumb); if(e.full)URL.revokeObjectURL(e.full); URLCACHE.delete(id); }
}
function blobToDataURL(blob){
  return new Promise((res,rej)=>{
    const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=()=>rej(r.error); r.readAsDataURL(blob);
  });
}
function dataURLToBlob(du){
  const [head, b64] = du.split(',');
  const mime = (head.match(/data:(.*?);/)||[])[1] || 'image/jpeg';
  const bin = atob(b64); const arr = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  return new Blob([arr],{type:mime});
}

/* ================================================================
   THE PLANNER — deterministic rules, runs on-device
   Priority for a given day:
   1. blackout (holiday/travel)  2. a captured test on/near that day
   3. exam runway (≤10 days out) 4. the weekly rhythm  5. rest
   ================================================================ */
let PLAN_MEMO = new Map();
function mixSeq(kid){
  // weights → rotation sequence, e.g. MA×2 EN×1 CL×1 SC×1 → [MA,EN,CL,SC,MA]
  const subs = (kid.subjects && kid.subjects.length) ? kid.subjects : SUBJECTS.map(s=>s.k);
  const mix = (kid.plan && kid.plan.mix) || {};
  const w = subs.map(s=>({s, n: mix[s]==null ? 1 : mix[s]})).filter(x=>x.n>0);
  if(!w.length) return subs.slice();
  const seq = []; const maxn = Math.max(...w.map(x=>x.n));
  for(let r=0;r<maxn;r++) for(const x of w) if(x.n>r) seq.push(x.s);
  return seq;
}
function dayMins(kid, ds){
  const r = (kid.plan.rhythm||{})[strToDate(ds).getDay()] || {};
  return r.mins || kid.plan.mins || 20;
}
function reachesRotation(kid, ds){
  // does this day fall through to the subject rotation? (nothing higher-priority claims it)
  if(kid.plan.overrides && kid.plan.overrides[ds]) return false;
  if((kid.plan.blackouts||[]).some(b=>b.start<=ds && ds<=b.end)) return false;
  const caps = CAPS.filter(c=>c.kidId===kid.id && !c.archived && c.testDate);
  if(caps.some(c=>c.testDate===ds)) return false;
  if((kid.plan.exams||[]).some(e=>e.date===ds)) return false;
  // spelling/听写 test prep is now a light nudge (not a day claim), so the days before a
  // captured test are normal rotation days again — no exclusion here.
  // exam-runway days still consume the rotation (exam bias is a display overlay),
  // so they are NOT excluded here — keeps the rotation counter consistent.
  const r = (kid.plan.rhythm||{})[strToDate(ds).getDay()] || {mode:'avail'};
  return r.mode==='avail' || r.mode==='study';
}
/* Never plan a chapter the school hasn't taught yet.
   A term tag says WHEN a chapter is taught — not that it's been taught *already*. Mid-Term-3
   the class may only be 2 chapters in, so "any T3 chapter" would serve topics from August.

   We work it out AUTOMATICALLY instead of asking the parent to tick anything: chapters are listed
   in teaching order, so if a term has N chapters and we're W weeks into its (roughly 10-week)
   teaching span, the class is realistically on chapter ceil(N × W/total). Everything from earlier
   terms is taught; nothing from later terms is. A parent can override the guess in the syllabus
   editor if their class is genuinely ahead or behind (kid.taughtUpto), but they never have to. */
function taughtFlags(kid, subject, ds){
  const syl = (kid.syllabus && kid.syllabus[subject]) || [];
  const ovr = kid.taughtUpto && kid.taughtUpto[subject];
  if(typeof ovr === 'number') return syl.map((c,i)=> i < ovr);   // parent set the marker by hand

  const term = currentTerm(ds), onBreak = termWeek(ds) === 0;
  const inTermTotal = syl.filter(c=>c.term===term).length;
  // how many of THIS term's chapters the class has plausibly reached.
  // On the school break: none yet (we revise instead). Once term starts: at least chapter 1.
  const reached = onBreak ? 0 : Math.max(1, Math.ceil(termProgress(ds) * inTermTotal));
  // chapters with no T1–T4 tag (the default) get paced against the school YEAR instead, by their
  // position in the list — so an untagged syllabus still can't serve chapters from next term.
  const yearReached = Math.max(1, Math.ceil(syl.length * yearProgress(ds)));
  let seen = 0;
  return syl.map((c,i)=>{
    if(!c.term) return i < yearReached;    // untagged → paced by position across the year
    if(c.term < term) return true;         // earlier terms are done
    if(c.term > term) return false;        // later terms haven't happened
    return ++seen <= reached;              // this term: paced by the week we're in
  });
}
function chapterCounts(kidId, subject){
  // how many logged study sessions each chapter has actually had
  const m = {};
  LOG.forEach(l=>{ if(l.kidId===kidId && l.subject===subject && l.topic) m[l.topic] = (m[l.topic]||0) + 1; });
  return m;
}
function chooseChapter(pool, kid, subject, turn){
  // Study the chapter that's had the LEAST attention, so coverage evens out and a newly-unlocked
  // chapter (0 sessions) gets picked up straight away. Ties break on the subject's turn counter —
  // Science's 1st, 2nd, 3rd… visit — so an all-square pool still cycles instead of sticking.
  // (The old picker indexed by the date, which resonated: Science came round every 5th day and had
  //  5 chapters, so date % 5 landed on the same chapter forever.)
  const cnt = chapterCounts(kid.id, subject), L = pool.length;
  let best = pool[0], bestN = Infinity;
  for(let j=0; j<L; j++){
    const c = pool[(turn + j) % L], n = cnt[c.t] || 0;
    if(n < bestN){ bestN = n; best = c; }
  }
  return best.t;
}
function syllabusPick(kid, subject, ds, dayNum){
  const syl = (kid.syllabus && kid.syllabus[subject]) || [];
  if(!syl.length) return null;
  const term = currentTerm(ds);
  const ok = taughtFlags(kid, subject, ds);
  const auto = !(kid.taughtUpto && typeof kid.taughtUpto[subject] === 'number');
  const turn = subjectTurn(kid, subject, ds);
  const pickFrom = (pool, extra) => Object.assign({t: chooseChapter(pool, kid, subject, turn), auto}, extra||{});

  const now = syl.filter((c,i)=> ok[i] && (!c.term || c.term===term));
  if(now.length) return pickFrom(now);

  // this term hasn't taught anything yet (e.g. still on the June break, or a pure-revision Term 4)
  // → revise earlier terms rather than run ahead into chapters the class hasn't seen.
  const earlier = syl.filter((c,i)=> ok[i] && c.term && c.term < term);
  if(earlier.length) return pickFrom(earlier, {revision:true});

  return null;   // nothing taught yet — the subject still runs, just without a chapter
}
function syllabusTopic(kid, subject, ds, dayNum){
  const p = syllabusPick(kid, subject, ds, dayNum);
  return p ? p.t : null;
}
function rotationIndex(kid, ds){
  // walk from the anchor counting rotation days — busy/rest/trip days consume
  // nothing, so subjects flow around them instead of being lost
  let start = kid.plan.anchor || todayStr();
  if(gapDays(start, ds) < 0 || gapDays(start, ds) > 400){
    const d = strToDate(ds); d.setDate(d.getDate()-120); start = dToStr(d);
  }
  let n = 0;
  const d = strToDate(start), end = strToDate(ds).getTime();
  while(d.getTime() < end){
    if(reachesRotation(kid, dToStr(d))) n++;
    d.setDate(d.getDate()+1);
  }
  return n;
}
function rotationSubject(kid, ds){
  const seq = mixSeq(kid);
  return seq[ rotationIndex(kid, ds) % seq.length ];
}
function subjectTurn(kid, subject, ds){
  // which visit this is for THIS subject — Science's 1st, 2nd, 3rd… turn. Derived from the same
  // rotation counter, so it steps once per actual visit and skipped/busy days don't knock it out.
  const seq = mixSeq(kid), L = seq.length, n = rotationIndex(kid, ds);
  const perCycle = seq.filter(s=>s===subject).length;
  if(!perCycle) return 0;
  let turn = Math.floor(n / L) * perCycle;
  for(let i = Math.floor(n/L)*L; i < n; i++) if(seq[i % L] === subject) turn++;
  return turn;
}
function planFor(kid, ds){
  const key = kid.id + '|' + ds;
  if(PLAN_MEMO.has(key)) return PLAN_MEMO.get(key);
  const p = computePlan(kid, ds);
  PLAN_MEMO.set(key, p);
  return p;
}
function rotationSubjectExcluding(kid, ds, excl){
  const s = rotationSubject(kid, ds);
  if(s !== excl) return s;
  const seq = mixSeq(kid).filter(x=>x!==excl);
  if(!seq.length) return s;
  return seq[ parseInt(ds.replace(/-/g,''),10) % seq.length ];
}
function studyDaysBetween(kid, ds, T){
  // count study-eligible days strictly between ds and T
  let n=0, guard=0; const d=strToDate(ds); d.setDate(d.getDate()+1);
  const end=strToDate(T).getTime();
  while(d.getTime()<end && guard++<40){ if(reachesRotation(kid, dToStr(d))) n++; d.setDate(d.getDate()+1); }
  return n;
}
function spellingNudges(kid, ds){
  // upcoming spelling/听写 tests → practice nudges on the ~3 nearest STUDY days before each test
  if(!reachesRotation(kid, ds)) return [];
  const caps = CAPS.filter(c=>c.kidId===kid.id && !c.archived && c.type==='spelling' && c.testDate && c.testDate>ds);
  const res = [];
  for(const c of caps){
    if(studyDaysBetween(kid, ds, c.testDate) <= 2){   // ds is one of the 3 nearest study days before the test
      res.push({capId:c.id, subject:c.subject, type:c.type, testDate:c.testDate, days:gapDays(ds,c.testDate)});
    }
  }
  return res.sort((a,b)=>a.testDate.localeCompare(b.testDate)).slice(0,2);
}
function computePlan(kid, ds){
  const out = { testToday:null, mins: dayMins(kid, ds) };
  const caps = CAPS.filter(c=>c.kidId===kid.id && !c.archived && c.testDate);
  out.testToday = caps.find(c=>c.testDate===ds) || null;
  const examToday = (kid.plan.exams||[]).find(e=>e.date===ds) || null;
  if(examToday) out.examToday = examToday;

  // explicit per-day override (tap a day in Calendar) beats everything
  const ov = kid.plan.overrides && kid.plan.overrides[ds];
  if(ov){
    if(ov.mode==='study') return Object.assign(out, {kind:'study', subject:ov.subject, why:'your pick for this day', override:true});
    if(ov.mode==='busy')  return Object.assign(out, {kind:'busy', label:ov.label||'Busy day', override:true});
    return Object.assign(out, {kind:'rest', override:true});
  }

  const b = (kid.plan.blackouts||[]).find(b=> b.start<=ds && ds<=b.end);
  if(b) return Object.assign(out, {kind:'blackout', label:b.label});

  // a Busy or Rest weekday is OFF — and this wins over test/exam-day study, so a busy day
  // stays busy even when a spelling/听写 test or exam lands on it. (The test banner still shows.)
  const r = (kid.plan.rhythm||{})[strToDate(ds).getDay()] || {mode:'avail'};
  if(r.mode==='busy') return Object.assign(out, {kind:'busy', label:r.label||'Busy day'});
  if(r.mode==='rest') return Object.assign(out, {kind:'rest'});
  // a Class / tuition day COUNTS as that subject's study — logging it feeds the pet and keeps
  // the streak, and the app won't also queue separate homework for the subject that day.
  if(r.mode==='class'){
    const subj = r.subject || 'CL';
    return Object.assign(out, {kind:'study', subject:subj, classDay:true,
      why:(r.label && r.label.trim() ? r.label.trim() : subjName(subj)+' tuition') + " — counts as today's study"});
  }

  // upcoming spelling/听写 tests are a light PRACTICE NUDGE on the ~3 nearest study days
  // before the test — they no longer hijack whole study days (keeps subjects balanced).
  out.practiceNudges = spellingNudges(kid, ds);

  // on a test/exam day the test is done at school, so the evening study switches to a
  // DIFFERENT subject (not the one just tested). Still streak-safe / skippable.
  const dNum = parseInt(ds.replace(/-/g,''),10);
  if(out.testToday){
    const other = rotationSubjectExcluding(kid, ds, out.testToday.subject);
    return Object.assign(out, {kind:'study', subject:other, testDay:true, testedSubject:out.testToday.subject,
      topic: syllabusTopic(kid, other, ds, dNum) || undefined,
      why:`test's done — keep the streak with ${subjName(other)}`, capId:out.testToday.id});
  }
  if(examToday){
    const other = rotationSubjectExcluding(kid, ds, examToday.subject);
    return Object.assign(out, {kind:'study', subject:other, testDay:true, testedSubject:examToday.subject,
      topic: syllabusTopic(kid, other, ds, dNum) || undefined,
      why:`exam's done — keep the streak with ${subjName(other)}`});
  }
  const dayNum = parseInt(ds.replace(/-/g,''),10);
  // exam runway (within 14 days) gets PRIORITY on ~2 of every 3 study days;
  // the 3rd day juggles the regular current-term syllabus, so nothing stalls.
  const near = (kid.plan.exams||[])
    .filter(e=>{ const g=gapDays(ds, e.date); return g>=1 && g<=14; })
    .sort((a,b)=>a.date.localeCompare(b.date));
  if(near.length && dayNum % 3 !== 0){
    const pick = near[ dayNum % near.length ];
    const asg = {kind:'study', subject:pick.subject, examId:pick.id, exam:pick,
      why:`📝 ${pick.name||'Exam'} ${cdLabel(gapDays(ds,pick.date))}`};
    if(pick.topics && pick.topics.length){
      const undone = pick.topics.filter(tp=>!(pick.ticks && pick.ticks[tp]));
      const pool = undone.length ? undone : pick.topics;
      const topic = pool[ dayNum % pool.length ];
      asg.topic = topic;   // topic shows once, in the chip below (not repeated in the why line)
    }
    return Object.assign(out, asg);
  }
  // regular study day: subject mix picks the subject, syllabus picks a chapter school has taught
  const subject = rotationSubject(kid, ds);
  const pick = syllabusPick(kid, subject, ds, dayNum);
  const wk = termWeek(ds);
  const why = !pick ? 'from the subject mix'
    : pick.revision ? (wk ? 'Revision' : 'Revision — school\'s on break')
    : termName(currentTerm(ds)) + (wk ? ' · week ' + wk : '');
  return Object.assign(out, {kind:'study', subject,
    topic: pick ? pick.t : undefined,
    sylNudge: pick && pick.auto ? 'auto' : null,
    why});
}

function streak(kid){
  let n=0; const d=new Date(); d.setHours(0,0,0,0);
  for(let i=0;i<180;i++){
    const ds = dToStr(d);
    if(doneOn(kid.id, ds)) n++;
    else{
      const p = planFor(kid, ds);
      const offday = p.kind!=='study' || p.testDay;   // test days are streak-safe
      if(!offday && i>0) break;           // a missed study day breaks the streak (today doesn't, yet)
    }
    d.setDate(d.getDate()-1);
  }

}

function doFeed(kidId, subject, isExtra, ev, isPractice){
  const kid = kidById(kidId); if(!kid) return;
  if(feedsOn(kidId, todayStr()) >= MAX_FEEDS_PER_DAY){
    toast(`🌟 ${kid.name} studied lots today — come back tomorrow!`); return;
  }
  // record WHICH chapter was studied, not just the subject — that's what lets the planner serve the
  // least-studied chapter next time (and it's the raw material for the future Progress tab).
  let topic = null;
  if(subject && !isPractice){
    const p = planFor(kid, todayStr());
    topic = (p.kind==='study' && p.subject===subject && p.topic) ? p.topic
          : syllabusTopic(kid, subject, todayStr(), 0);   // "study a different subject" → its own chapter
  }
  LOG.push({id:uid(), date:todayStr(), kidId, subject:subject||null, topic, extra:!!isExtra, practice:!!isPractice, ts:Date.now()});
  saveLOG();
  if(!kid.pet) kid.pet = { sp: pickSpecies(kid), fed:0 };
  const before = petStage(kid.pet.fed);
  kid.pet.fed++;
  const after = petStage(kid.pet.fed);
  const graduated = kid.pet.fed >= ADULT;
  let grownName = SPECIES[kid.pet.sp].name, grownEmoji = SPECIES[kid.pet.sp].e;
  let grownVisual = PET_ART[grownName] ? `<img src="${PET_ART[grownName]}" alt="" style="height:92px;width:auto">` : grownEmoji;
  if(graduated){
    kid.collection = kid.collection || [];
    kid.collection.push(kid.pet.sp);
    kid.pet = { sp: pickSpecies(kid), fed:0 };
  }
  saveS();
  let fx = [innerWidth/2, innerHeight*0.4];
  if(ev && ev.target){ const b = ev.target.closest('button'); if(b){ const r=b.getBoundingClientRect(); fx=[r.left+r.width/2, r.top+r.height/2]; } }
  const s = streak(kid);
  render();
  const pe = document.getElementById('petEmoji');
  if(pe){ pe.classList.add('bounce'); const r = pe.getBoundingClientRect(); petPop(r.left+r.width/2, r.top+r.height*0.35); }
  fxBurst(fx[0], fx[1]);
  if(graduated){
    celebrate(grownVisual, `${grownName} joined the collection! 🏆`,
      `${grownName} moved into ${kid.name}'s pet collection. A brand-new mystery egg just appeared — keep studying! 🥚`);
  } else if(after>before){
    if(after===2){   // blob → adult: THE REVEAL
      celebrate(grownVisual, `It's a ${grownName}! 🎉`,
        `Surprise! Your mystery blob grew into a ${grownName}. Keep feeding to fully raise it! 💛`);
    } else {         // egg → blob
      celebrate('🫧', 'It hatched! 🎉', 'A mystery blob appeared — keep studying to see what it becomes!');
    }
  } else {
    const food = FOODS[Math.floor(Math.random()*FOODS.length)];
    toast(`${food} Yum!${s>1?' 🔥 '+s+'-day streak':''}${isExtra?' +1 extra!':''}`);
  }
}

/* ----- fireworks ----- */
let FXP = [], FXON = false;
function fxBurst(x, y){
  const cv = $('fx');
  cv.width = innerWidth; cv.height = innerHeight;
  const COLORS = ['#f59e0b','#ef4444','#10b981','#3b82f6','#38bdf8','#8b5cf6','#fbbf24','#34d399'];
  const spawn = (cx, cy, n, pow) => {
    for(let i=0;i<n;i++){
      const a = Math.random()*Math.PI*2, v = (0.35+Math.random()*0.65)*pow;
      FXP.push({ x:cx, y:cy, vx:Math.cos(a)*v, vy:Math.sin(a)*v-3.2,
        g:0.16+Math.random()*0.08, life:55+Math.random()*35,
        c:COLORS[(Math.random()*COLORS.length)|0], r:3+Math.random()*4,
        rot:Math.random()*Math.PI, vr:(Math.random()-0.5)*0.35 });
    }
  };
  spawn(x, y, 80, 9);
  setTimeout(()=>spawn(x-80+Math.random()*160, y-100, 50, 7), 200);
  setTimeout(()=>spawn(x-80+Math.random()*160, y-60, 50, 8), 420);
  if(!FXON){ FXON = true; requestAnimationFrame(fxTick); }
}
function fxTick(){
  const cv = $('fx'), ctx = cv.getContext('2d');
  ctx.clearRect(0,0,cv.width,cv.height);
  FXP = FXP.filter(p=>p.life>0);
  for(const p of FXP){
    p.x+=p.vx; p.y+=p.vy; p.vy+=p.g; p.vx*=0.985; p.life--; p.rot+=p.vr;
    ctx.save(); ctx.globalAlpha=Math.min(1,p.life/30);
    ctx.translate(p.x,p.y); ctx.rotate(p.rot);
    ctx.fillStyle=p.c; ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r); ctx.restore();
  }
  if(FXP.length){ requestAnimationFrame(fxTick); }
  else{ FXON=false; ctx.clearRect(0,0,cv.width,cv.height); }
}

// ---- OS notifications (opt-in). iOS PWAs can't be woken while fully closed (no server),
// so these fire when the app is opened or brought back to the foreground. ----
function notifySupported(){ return 'Notification' in window; }
function remindersDue(){
  const out = [], today = todayStr();
  S.kids.forEach(k=>{
    CAPS.filter(c=>c.kidId===k.id && !c.archived && c.testDate && c.words && c.words.length).forEach(c=>{
      const n = daysUntil(c.testDate);
      if(n>=0 && n<=1 && tickCount(c) < c.words.length){
        out.push({ key:'prac-'+c.id+'-'+today,
          title:`📝 ${k.name}: ${c.subject==='CL'?'听写':'spelling'} ${n===0?'today':'tomorrow'}`,
          body:`${c.words.length - tickCount(c)} words left to practise — open Mr 100.` });
      }
    });
  });
  const neverBackedUp = !S.lastBackupAt;
  if(hasAnyData() && ((neverBackedUp && daysSince(S.firstRunAt)>=3) || (!neverBackedUp && daysSince(S.lastBackupAt)>=14))){
    out.push({ key:'backup-'+today, title:'💾 Time to back up Mr 100', body:'Download a backup so nothing’s lost.' });
  }
  return out;
}
function fireReminders(){
  if(!S.notifyPractice || !notifySupported() || Notification.permission!=='granted') return;
  if(!S.notifiedKeys) S.notifiedKeys = {};
  let changed = false;
  remindersDue().forEach(r=>{
    if(S.notifiedKeys[r.key]) return;
    try{ new Notification(r.title, { body:r.body, tag:r.key }); }catch(e){}
    S.notifiedKeys[r.key] = true; changed = true;
  });
  // prune keys older than ~30 days to avoid unbounded growth
  const cutoff = new Date(Date.now()-30*86400000).toISOString().slice(0,10);
  Object.keys(S.notifiedKeys).forEach(kk=>{ const d=kk.slice(-10); if(d < cutoff){ delete S.notifiedKeys[kk]; changed=true; } });
  if(changed) saveS();
}
async function toggleNotify(){
  if(S.notifyPractice){ S.notifyPractice=false; saveS(); toast('Reminders off'); render(); return; }
  if(!notifySupported()){ toast('This device doesn’t support notifications'); return; }
  let perm = Notification.permission;
  if(perm==='default'){ try{ perm = await Notification.requestPermission(); }catch(e){ perm='denied'; } }
  if(perm==='granted'){ S.notifyPractice=true; saveS(); toast('✅ Reminders on'); render(); fireReminders(); }
  else{ toast('⚠️ Notifications are blocked — turn them on in your phone’s Settings for Mr 100'); render(); }
}

/* ---------------- CALENDAR TAB ---------------- */
let CAL_OFF = 0;
function calShift(n){ CAL_OFF += n; render(); }
function bestStreak(kid){
  let best=0, run=0;
  const d = new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()-179);
  const today = todayStr();
  for(let i=0;i<180;i++){
    const ds = dToStr(d);
    if(doneOn(kid.id, ds)) run++;
    else{
      const p = planFor(kid, ds);
      if(p.kind==='study' && !p.testDay && ds!==today) run=0;   // missed study day breaks it; test days & today don't
    }
    if(run>best) best=run;
    d.setDate(d.getDate()+1);
  }
  return best;
}
function calendarCard(k){
  const base = new Date(); base.setHours(0,0,0,0); base.setDate(1); base.setMonth(base.getMonth()+CAL_OFF);
  const monthName = base.toLocaleDateString('en-SG',{month:'long', year:'numeric'});
  const firstWd = base.getDay();
  const dim = new Date(base.getFullYear(), base.getMonth()+1, 0).getDate();
  const today = todayStr();
  let cells = '';
  for(let i=0;i<firstWd;i++) cells += `<div class="calcell off"></div>`;
  const d = new Date(base);
  for(let day=1; day<=dim; day++){
    d.setDate(day);
    const ds = dToStr(d);
    const p = planFor(k, ds);
    const done = doneOn(k.id, ds);
    const isPast = ds < today;
    let mark;
    if(p.testToday || p.examToday){
      const s = subjMeta((p.testToday&&p.testToday.subject) || (p.examToday&&p.examToday.subject));
      mark = `<span class="slab" style="background:${s.color};color:#fff">📝${esc(s.abbr||'')}</span>`;
    }
    else if(done){ const s=subjMeta(p.subject); mark = `<span class="mark">🔥</span>`; }
    else if(p.kind==='study' && isPast) mark = `<span class="mark miss">·</span>`;
    else if(p.kind==='study') mark = `<span class="slab" style="background:${subjMeta(p.subject).color}1e;color:${subjMeta(p.subject).color}">${esc(subjAbbr(p.subject))}</span>`;
    else if(p.kind==='blackout') mark = `<span class="mark">🏝</span>`;
    else if(p.kind==='busy') mark = `<span class="mark" style="font-size:9px">🗓</span>`;
    else mark = `<span class="mark"></span>`;
    cells += `<button class="calcell ${ds===today?'today':''}" onclick="openDayDetail('${ds}')">
      <span class="daynum">${day}</span>${mark}
    </button>`;
  }
  return `<div class="card">
    <div class="calnav">
      <button class="nb" onclick="calShift(-1)">‹</button>
      <span class="mon">${esc(monthName)}</span>
      <button class="nb" onclick="calShift(1)">›</button>
    </div>
    <div class="calgrid">
      ${DAY_NAMES.map(n=>`<div class="calhead">${n[0]}</div>`).join('')}
      ${cells}
    </div>
    <div class="callegend">
      ${SUBJECTS.map(s=>`<span class="lg" style="background:${s.color}1e;color:${s.color}">${esc(s.abbr)}</span>`).join('')}
      <span class="lg" style="background:var(--bg);color:var(--ink2)">🔥 done</span>
      <span class="lg" style="background:var(--bg);color:var(--ink2)">📝 test</span>
    </div>
    <div class="small muted" style="margin-top:8px">Tap any day for details or to change it.</div>
  </div>`;
}

function parseTopics(raw){ return (raw||'').split('\n').map(t=>t.trim()).filter(Boolean); }
function saveExam(id){
  const k = activeKid();
  const subEl = document.querySelector('#ex_sub .chip.on');
  const date = $('ex_date').value;
  if(!subEl){ toast('Pick a subject'); return; }
  if(!date){ toast('Pick a date'); return; }
  let name = $('ex_name').value.trim();
  if(!name){
    const r = document.querySelector('#ex_round .chip.on'), c = document.querySelector('#ex_comp .chip.on');
    name = [r&&r.dataset.r, c&&c.dataset.c].filter(Boolean).join(' · ');
  }
  const checked = [...document.querySelectorAll('#ex_chapters .chip.on')].map(x=>x.dataset.topic);
  const typed = parseTopics(($('ex_topics')||{}).value || '');
  const topics = [...new Set([...checked, ...typed])];
  if(id){
    const ex = k.plan.exams.find(x=>x.id===id);
    const ticks = {}; // keep ticks only for topics that still exist
    topics.forEach(t=>{ if(ex.ticks && ex.ticks[t]) ticks[t]=true; });
    Object.assign(ex, {subject:subEl.dataset.s, name, date, topics, ticks});
  }
  else{ k.plan.exams.push({id:uid(), subject:subEl.dataset.s, name, date, topics, ticks:{}}); }

function toggleExamTopicByName(examId, topic){
  const k = activeKid();
  const ex = (k.plan.exams||[]).find(x=>x.id===examId); if(!ex) return;
  if(!ex.ticks) ex.ticks = {};
  if(ex.ticks[topic]) delete ex.ticks[topic]; else ex.ticks[topic] = true;
  saveS();
  const allDone = ex.topics && ex.topics.length && ex.topics.every(t=>ex.ticks[t]);
  if(ex.ticks[topic]) toast(allDone ? `🎉 All topics revised for ${ex.name||'the exam'}!` : '✓ Marked revised');

/* ----- year syllabus editor ----- */
function parseSyllabus(raw){
  return (raw||'').split('\n').map(l=>l.trim()).filter(Boolean).map(l=>{
    const m = l.match(/^(?:t|term)?\s*([1-4])\s*[:\-.)|]\s*(.+)$/i) || l.match(/^(?:t|term)\s*([1-4])\s+(.+)$/i);
    if(m) return {t:m[2].trim(), term:parseInt(m[1],10)};
    return {t:l, term:null};
  });
}
let SYL_EDIT = null, SYL_SUBJ = null, SYL_OVR = null;
function openSyllabus(subject){
  const k = activeKid();
  SYL_SUBJ = subject;
  const existing = (k.syllabus && k.syllabus[subject]) || [];
  const src = existing.length ? existing : ((CURRICULUM[k.level]&&CURRICULUM[k.level][subject])||[]);
  SYL_EDIT = src.map(c=>({t:c.t, term:c.term||null}));
  const ov = k.taughtUpto && k.taughtUpto[subject];
  SYL_OVR = (typeof ov === 'number') ? ov : null;    // null = let the app work it out
  renderSyllabusEditor();
}
function renderSyllabusEditor(){

      <div class="sylterms">
        <button type="button" class="chip xs ${(!auto && SYL_OVR===i+1)?'on':''}" title="The class has just finished this chapter" onclick="setSylUpto(${i})">✓ up to here</button>
        ${[1,2,3,4].map(t=>`<button type="button" class="chip xs ${c.term===t?'on':''}" data-t="${t}" onclick="setSylTerm(${i},${t},this)">T${t}</button>`).join('')}
        <button type="button" class="chip xs sylx" onclick="removeSylRow(${i})">✕</button>
      </div>
    </div>`).join('');

function importPastedSyllabus(){
  const ta=$('syl_text'); if(!ta||!ta.value.trim()){ toast('Paste the contents page first'); return; }
  const have = new Set(SYL_EDIT.map(c=>c.t.toLowerCase()));
  let added=0;
  ta.value.split('\n').forEach(raw=>{
    let l=raw.trim(); if(!l) return;
    l = l.replace(/[.·•\s]{2,}\d{1,3}\s*$/,'').replace(/\s+\d{1,3}\s*$/,'')
         .replace(/^\s*(?:chapter|unit|ch|lesson|topic)\s*\d+\s*[:.\-–—、]?\s*/i,'')
         .replace(/^\s*\d{1,2}\s*[.):\-–—]\s*/,'').replace(/^[\-–—•*·]\s*/,'').trim();
    let term=null; const tm=l.match(/\bt(?:erm)?\s*([1-4])\b/i);
    if(tm){ term=+tm[1]; l=l.replace(/\bt(?:erm)?\s*[1-4]\b[:\-–—\s]*/i,'').trim(); }
    const key=l.toLowerCase();
    if(l.length<2 || /^(contents|table of contents|page|index|syllabus)$/i.test(key) || have.has(key)) return;
    have.add(key); SYL_EDIT.push({t:l, term}); added++;
  });
  renderSyllabusEditor();
  toast(added?`✨ Added ${added} chapters — now tag their terms`:'Nothing new to add');
}

}

/* ----- exam-notice importer (paste → find dates + subjects + topics) ----- */
let EXAM_IMPORT = null;
const EI_MONTHS = {jan:1,january:1,feb:2,february:2,mar:3,march:3,apr:4,april:4,may:5,jun:6,june:6,
  jul:7,july:7,aug:8,august:8,sep:9,sept:9,september:9,oct:10,october:10,nov:11,november:11,dec:12,december:12};
function eiPad(n){ return String(n).padStart(2,'0'); }
function eiSubject(s){
  s = s.toLowerCase();
  if(/\b(maths?|mathematics)\b/.test(s)) return 'MA';
  if(/\b(science|sci)\b/.test(s)) return 'SC';
  if(/chinese|华文|华语|中文|mother\s*tongue|\bcl\b|\bmt\b/.test(s)) return 'CL';
  if(/english|\beng\b|\bel\b/.test(s)) return 'EN';
  return null;
}
function eiDate(s){
  const YR = todayStr().slice(0,4);
  let m = s.match(/(20\d\d)[-/](\d{1,2})[-/](\d{1,2})/);
  if(m) return `${m[1]}-${eiPad(m[2])}-${eiPad(m[3])}`;
  m = s.match(/\b(\d{1,2})\s+([A-Za-z]{3,9})\.?(?:\s+(20\d\d))?/);
  if(m && EI_MONTHS[m[2].toLowerCase()]) return `${m[3]||YR}-${eiPad(EI_MONTHS[m[2].toLowerCase()])}-${eiPad(m[1])}`;
  m = s.match(/\b([A-Za-z]{3,9})\.?\s+(\d{1,2})\b/);
  if(m && EI_MONTHS[m[1].toLowerCase()]) return `${YR}-${eiPad(EI_MONTHS[m[1].toLowerCase()])}-${eiPad(m[2])}`;
  m = s.match(/\b(\d{1,2})[/](\d{1,2})(?:[/](20\d\d))?\b/);
  if(m) return `${m[3]||YR}-${eiPad(m[2])}-${eiPad(m[1])}`;
  return null;
}
function eiTopics(line, date, subj){
  let s = ' '+line+' ';
  // strip the date-ish text and subject words, keep the rest as topics
  s = s.replace(/(20\d\d[-/]\d{1,2}[-/]\d{1,2})/g,' ')
       .replace(/\b\d{1,2}\s+[A-Za-z]{3,9}\.?(\s+20\d\d)?/g,' ')
       .replace(/\b[A-Za-z]{3,9}\.?\s+\d{1,2}\b/g,' ')
       .replace(/\b\d{1,2}[/]\d{1,2}([/]20\d\d)?\b/g,' ')
       .replace(/\b(maths?|mathematics|science|sci|english|eng|el|chinese|华文|华语|中文|mother\s*tongue|cl|mt|wa\d?|eye|paper|exam|test|term\s*\d)\b/gi,' ')
       .replace(/[\(\)\[\]:•\-–—|]/g,' ');
  return s.split(/[,、;·/]|\s{2,}/).map(t=>t.trim()).filter(t=>t.length>=3 && !/^\d+$/.test(t)).slice(0,8);
}
function parseExamNotice(text){
  const out = [];
  (text||'').split('\n').forEach(raw=>{
    const line = raw.trim(); if(!line) return;
    const subj = eiSubject(line), date = eiDate(line);
    if(subj && date){
      out.push({subject:subj, date, name:'', topics:eiTopics(line, date, subj), on:true});
    }
  });
  return out;
}

/* ----- smart word extraction (paste everything → tap to keep) ----- */
const STOP = new Set(('the a an and or but so to of in on at for with was were is are am be been being had has have '+
  'he she it they them him his her hers my me we us our you your i this that these those from by as when who whom '+
  'what which where why how did do does done not no nor its there their then than too very just each while about '+
  'into out up down over under again all any both few more some most other own same mr mrs ms miss dr').split(' '));
function smartExtract(){
  const text = PENDING.words || '';
  if(!text.trim()){ toast('Paste the copied text first'); return; }
  const hasCJK = /[㐀-鿿]/.test(text);
  const toks = []; const seen = new Set();
  // Chinese items come in PRE-SELECTED — a 听写 sheet is "keep everything", and making her tap 28
  // chips is how items quietly go missing. (English stays opt-in: only the underlined words count.)
  const add = (t, py, mode, keep)=>{ t=(t||'').trim(); if(!t) return; const key=t.toLowerCase();
    if(!seen.has(key)){ seen.add(key); toks.push({t, py:py||'', mode:mode||'write', keep:!!keep}); } };
  const addZh = (t, py, mode)=> add(t, py, mode, true);
  if(hasCJK){
    /* Chinese 听写. The sheet tests two things in OPPOSITE directions:
         我会写 — she hears the word and writes the 汉字   → prompt with the pinyin, answer is the 字
         我会认 — she's shown the 字 and writes the pinyin → prompt with the 字, answer is the pinyin

       Real iPhone Live Text output is a mess: it puts the row numbers on their own lines, and it
       often emits the 我会认 header BEFORE the 我会写 phrases. So the section headers and the row
       numbering are both useless as signals — trusting them shattered every phrase into single
       characters (宝 / 贝 / 卡 / 片…). Two things ARE reliable, and they're all we use:
         1. a pinyin line always sits immediately above the characters it belongs to, so a CJK line
            with no pinyin above it is page furniture (the title, 日期, the footer) → skip;
         2. 我会认 items are always SINGLE characters; 我会写 items are always 2+ characters.
       Pinyin comes from the built-in table, not the scan — Live Text mangles the tone marks
       (zhāng → "zhãng", bǎo → "bdo", lǐ → "ii") and for 我会认 the pinyin is the answer. */
    const isPY  = s => /[a-zA-Zāáǎàēéěèīíǐìōóǒòūúǔùǖǘǚǜüãẽĩõũăĕĭŏŭ]/.test(s) && !/[㐀-鿿]/.test(s);
    const cjkOf = s => s.replace(/[^㐀-鿿，。！？：、；“”‘’]/g,'');

    /* ESCAPE HATCH — an explicit, unambiguous format that doesn't depend on the scan at all:
         写: 大象           (or W:)  → she writes the 汉字
         认: 纸 机 块 跟    (or R:)  → she writes the pinyin; a whole row can go on one line
         认: 觉=jiào 漂=piào         → pin the pinyin when the school's reading isn't the default
       If ANY line is tagged this way we use only the tagged lines and ignore the OCR guessing.

       The `字=pinyin` override matters: the built-in table stores ONE reading per character, and
       for a 多音字 the school may be teaching the other one — the P2 sheet wants 睡觉 jiào, not
       jué; 漂亮 piào, not piāo; 吐 tù, not tǔ; 倒 dǎo, not dào. Without this the card would tell
       her that her correct answer is wrong, which is worse than not having the feature. */
    const TAG = /^\s*(写|認|认|W|R)\s*[:：]\s*(.+)$/i;
    if(text.split('\n').some(l=>TAG.test(l))){
      text.split('\n').forEach(raw=>{
        const m = TAG.exec((raw||'').trim()); if(!m) return;
        const recog = /认|認|R/i.test(m[1]);
        const body = m[2].trim();
        if(recog){
          body.split(/\s+/).filter(Boolean).forEach(tok=>{
            const ov = tok.match(/^([㐀-鿿])\s*[=＝]\s*(.+)$/);          // 觉=jiào — the school's reading wins
            if(ov){ addZh(ov[1], pyClean(ov[2]), 'recog'); return; }
            cjkOf(tok).replace(/[，。！？：、；“”‘’]/g,'').split('')
              .forEach(ch=> addZh(ch, pyOf(ch), 'recog'));            // otherwise use the table
          });
        } else {
          const w = cjkOf(body);
          if(w) addZh(w, pyOfWord(w), 'write');
        }
      });
      if(toks.length){ PENDING.pickTokens = toks.slice(0,200); render(); return; }
    }

    let pend = null;
    text.split('\n').forEach(raw=>{
      const line = (raw||'').trim(); if(!line) return;
      if(/我会[写认]|我會[寫認]/.test(line)){ pend = null; return; }        // section header
      if(isPY(line)){ pend = line.split(/\s+/).filter(isPY).map(pyClean); return; }
      if(!/[㐀-鿿]/.test(line)) return;                                     // a bare number / blank
      const body = cjkOf(line.replace(/^\s*\d{1,2}\s*[.、)]\s*/,''));
      if(!body || !pend){ pend = null; return; }                            // no pinyin above → not an item
      const chars = body.replace(/[，。！？：、；“”‘’]/g,'');
      if(chars.length === 1){
        addZh(chars, pyOf(chars) || pend[0] || '', 'recog');                // 我会认 — she writes the pinyin
      } else {
        addZh(body, pyOfWord(body) || pend.join(' '), 'write');             // 我会写 — she writes the 汉字
      }
      pend = null;
    });
    // A real 我会认 section is a GRID of characters, not a stray one. Some 听写 lists are just
    // 词语 and have no pinyin-writing section at all (Tyler's may well be one) — and a single
    // one-character word on such a list must NOT turn into "write the pinyin for this", a test
    // his school never sets. So only call it 我会认 when there are enough of them to be a grid.
    const singles = toks.filter(t=>t.mode==='recog');
    if(singles.length < 4) singles.forEach(t=>{ t.mode = 'write'; t.py = t.py || ''; });
  } else {
    // English: every word is a candidate — you tap the ones to keep (the underlined ones).
    const re = /[A-Za-zÀ-ɏḀ-ỿ]+(?:['’\-][A-Za-zÀ-ɏ]+)*/g; let m;
    while((m = re.exec(text))){ if(m[0].length >= 2) add(m[0]); }
  }
  if(!toks.length){ toast('No words found — check the pasted text'); return; }
  PENDING.pickTokens = toks.slice(0,200);
  render();
}
function pickAll(on){
  if(!PENDING.pickTokens) return;
  PENDING.pickTokens.forEach(t=>t.keep=on);
  render();
}
function togglePickTok(i, el){
  const t = PENDING.pickTokens[i];
  t.keep = !t.keep;
  el.classList.toggle('on', t.keep);
  const b = $('usePickedBtn');
  if(b) b.textContent = '✓ Use these ' + PENDING.pickTokens.filter(x=>x.keep).length + ' words';
}
function usePicked(){
  const kept = PENDING.pickTokens.filter(t=>t.keep);
  if(!kept.length){ toast('Tap at least one word to keep'); return; }
  PENDING.words = kept.map(t=>t.t).join('\n');
  PENDING.py = {}; PENDING.mode = {};
  kept.forEach(t=>{                                  // remember the pinyin and which way it's tested
    if(t.py) PENDING.py[t.t] = t.py;
    if(t.mode === 'recog') PENDING.mode[t.t] = 'recog';
  });
  PENDING.pickTokens = null;
  render();
  const nr = kept.filter(t=>t.mode==='recog').length;
  toast(`✅ ${kept.length} in the list${nr?` (${nr} 我会认 → pinyin)`:''}`);
}
function togglePickMode(i){
  // a misfiled item is one tap to re-file — the scan doesn't have to be perfect
  const t = PENDING.pickTokens[i];
  t.mode = (t.mode === 'recog') ? 'write' : 'recog';
  t.py = (t.mode === 'recog') ? (pyOf(t.t) || t.py) : (pyOfWord(t.t) || t.py);
  render();
}
function cancelPick(){ PENDING.pickTokens = null; render(); }

function pset(k,v){ PENDING[k]=v; render(); }
async function saveCapture(){
  const p = PENDING;
  if(p.pickTokens){ toast('Finish picking the words first (✓ Use these words)'); return; }
  if(!p.kidId){ toast('Pick a kid'); return; }
  if(!p.subject){ toast('Pick a subject'); return; }
  if(!p.type){ toast('Pick a type'); return; }
  const words = (p.words||'').split('\n').map(w=>w.trim()).filter(Boolean);
  // keep only the pinyin / 我会认 flags for words that actually survived (she may have edited the list)
  const py = {}, mode = {};
  words.forEach(w=>{ if(p.py && p.py[w]) py[w]=p.py[w]; if(p.mode && p.mode[w]) mode[w]=p.mode[w]; });
  let cap;
  if(p.editingId){
    cap = CAPS.find(c=>c.id===p.editingId);
    Object.assign(cap, {kidId:p.kidId, subject:p.subject, type:p.type, testDate:p.testDate||null, note:p.note.trim(), words, py, mode});
  }else{
    cap = { id:uid(), kidId:p.kidId, subject:p.subject, type:p.type,
      testDate:p.testDate||null, note:p.note.trim(), words, py, mode,
      image:p.imageBlob, thumb:p.thumbBlob, archived:false, createdAt:Date.now() };
    CAPS.push(cap);
  }
  try{ await idbPut(cap); }
  catch(err){ toast('⚠️ Could not save: '+err.message); return; }
  URL.revokeObjectURL(p.previewURL);
  PENDING=null;
  toast(cap.testDate ? '✅ Saved — countdown + plan updated' : '✅ Saved to library');
  render();
}
function cancelCapture(){
  if(PENDING && PENDING.previewURL) URL.revokeObjectURL(PENDING.previewURL);
  PENDING=null; render();
}
